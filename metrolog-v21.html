function sLearnLesson(idx){
  const l=LESSONS[idx],cases=l.cases,ci=S.lCaseIdx,allDone=ci>=cases.length,done=S.lCompleted.has(idx);
  let caseHtml='';
  if(allDone){
    caseHtml=`<div class="explain mb16"><b>✓ Все ${cases.length} кейса(ов) разобраны!</b></div>`;
    if(!done)caseHtml+=`<button class="btn btn-p btn-full" onclick="completeLesson(${idx})">Отметить как изученный ✓</button>`;
    else caseHtml+=`<div style="background:rgba(40,205,65,.07);border:1px solid rgba(40,205,65,.2);border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between">

  } else {
    const c=cases[ci];
    caseHtml=`<div class="flex mb14 g8"><div class="ps-strip">${cases.map((_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i<ci?'var(--green)':i===ci?'var(--blue)':'rgba(0,0,0,.12)'}"></div>`).join('')}</div><span class="f13 c-t2">Кейс ${ci+1} из ${cases.length}</span></div>`;
    caseHtml+=`<div class="card mb14" style="padding:22px;border:1px solid rgba(255,149,0,.18);background:rgba(255,149,0,.02)"><div class="fw6 f17 mb10">${c.q}</div>${c.frag?`<div class="proto-wrap mt10">${proto(c.frag)}</div>`:''}</div>`;
    caseHtml+=`<div class="col mb14" style="gap:8px">${cases[ci].opts.map((o,i)=>{let cls='opt';if(S.lCaseFB){if(i===c.a)cls+=' ok';else if(i===S.lCasePick&&i!==c.a)cls+=' no';}else if(i===S.lCasePick)cls+=' sel';const m=S.lCaseFB&&i===c.a?'<span style="margin-left:auto;color:var(--green)">✓</span>':(S.lCaseFB&&i===S.lCasePick&&i!==c.a?'<span style="margin-left:auto;color:var(--red)">✗</span>':'');return`<button class="${cls}" onclick="${S.lCaseFB?'':'pickLC('+i+')'}" ${S.lCaseFB?'style="cursor:default"':''}><span class="okey">${i+1}</span><span style="flex:1">${o}</span>${m}</button>`;}).join('')}</div>`;
    if(S.lCaseFB&&c.exp)caseHtml+=`<div class="explain mb14"><b>Пояснение: </b>${c.exp}</div>`;
    caseHtml+=`<div class="between"><div></div>${!S.lCaseFB?`<button class="btn btn-p" ${S.lCasePick===null?'disabled':''} onclick="checkLC()">Проверить →</button>`:`<button class="btn btn-p" onclick="nextLC()">${ci<cases.length-1?'Следующий кейс →':'Завершить кейсы →'}</button>`}</div>`;
  }
  return`<div>${navBar(null,true)}
<div class="page"><div class="mid" style="padding-top:32px;padding-bottom:80px">
  <div class="flex g8 mb20">
    <button class="btn btn-gsm" onclick="set({scr:'learn',lLesson:-1,lCaseIdx:0,lCasePick:null,lCaseFB:false})">← К урокам</button>

    ${done?'<span class="badge b-green">Изучен</span>':''}

  <div class="learn-layout">
    <div class="sidebar">
      <div class="eyebrow mb12">Уроки</div>
      <div class="col" style="gap:4px">
        ${LESSONS.map((ll,i)=>{const d=S.lCompleted.has(i);return`<div class="lesson-item ${d?'done-l':''} ${i===idx?'on':''}" onclick="openLesson(${i})" style="padding:10px 12px">
          <div class="lnum ${d?'ln-done':i===idx?'ln-on':''}" style="min-width:22px;height:22px;font-size:10px">${d?'✓':(i+1)}</div>
          <div class="f13 fw${i===idx?'6':'5'}" style="color:${i===idx?'var(--blue)':'var(--t1)'};line-height:1.3">${ll.icon} ${ll.title}</div>
        </div>`;}).join('')}
      </div>
    </div>
    <div>
      <div class="flex g8 mb20"><span style="font-size:24px">${l.icon}</span><div><div class="h2">${l.title}</div><div class="f13 c-t3 mt4">Урок ${idx+1} из ${LESSONS.length}</div></div></div>
      <div class="mb24">${l.body}</div>

  </div>

}

// Admin actions
function adminAddQ(){
  const q=S.adminQ;
  if(!q.text||!q.a||!q.b||!q.c||!q.d){toast('Заполните все поля','err');return}
  const arr=S.adminTab==='entry'?EQ:CQ;

  arr.push(newQ);
  set({adminQ:{text:'',a:'',b:'',c:'',d:'',ans:'a'}});

function doLogin(){
  const name=S.lName||'Иванов Иван Иванович';
  const role=S.lEmail.includes('admin')?'admin':'user';
  const isReg=S.loginMode==='reg';
  const pos=POSITIONS.find(p=>p.id===S.lPos);
  const enrollments=isReg&&S.lPos?makeEnrollments(S.lPos):S.enrollments;
  set({scr:'dash',
    user:{name,email:S.lEmail||'student@metrolog.pro',org:S.lOrg||null,role,
          positionId:isReg?S.lPos:null,positionName:isReg&&pos?pos.name:null},
    enrollments,lPos:''});
  if(isReg&&enrollments.length)
    toast('Зачислено: '+enrollments.length+' обязательных курсов','info');
  else
    toast('Добро пожаловать, '+firstName(name)+'!');
}
function goLogout(){set({scr:'landing',user:null,eQ:0,ePick:null,eFB:false,eAns:{},eScore:null,ePassed:false,cQ:0,cPick:null,cFB:false,cAns:{},cScore:null,cPassed:false})}
function startEntry(){set({scr:'ea',eaPhase:'intro',eaIdx:0,eaTA:{},eaSA:{},eaFB:false,eScore:null,ePassed:false});}
function startTrainer(){set({scr:'trainer',tIdx:0,tPick:null,tRes:null,tHint:false})}
function startControl(){
  if(S.tSolved.size<CASES.length){toast('Завершите тренажёр ('+S.tSolved.size+'/'+CASES.length+')','err');return}
  set({scr:'control',cQ:0,cPick:null,cFB:false,cAns:{},cScore:null,cPassed:false});
}
function pickOpt(k,isE){isE?set({ePick:k}):set({cPick:k})}
function confirmOpt(isE){
  if(isE){const q=EQ[S.eQ];set({eFB:true,eAns:{...S.eAns,[q.id]:S.ePick}})}
  else{const q=CQ[S.cQ];set({cFB:true,cAns:{...S.cAns,[q.id]:S.cPick}})}
}
function nextQ(isE){
  if(isE){
    if(S.eQ<EQ.length-1){set({eQ:S.eQ+1,ePick:null,eFB:false})}
    else{const sc=scoreFn(S.eAns,EQ),p=sc>=60;set({eScore:sc,ePassed:p,scr:'res_e'});if(p)toast('Тест пройден! '+sc+'%');else toast('Не пройден: '+sc+'%','err')}
  }else{
    if(S.cQ<CQ.length-1){set({cQ:S.cQ+1,cPick:null,cFB:false})}
    else{const sc=scoreFn(S.cAns,CQ),p=sc>=80;set({cScore:sc,cPassed:p,scr:'res_c'});if(p)toast('Допуск получен! '+sc+'%');else toast('Не пройден: '+sc+'%','err')}
  }
}
function checkCase(){if(S.tPick===null)return;const c=CASES[S.tIdx],ok=S.tPick===c.a;if(ok){const ns=new Set(S.tSolved);ns.add(S.tIdx);toast('Верно! +1 кейс ✓','info');set({tRes:{ok},tSolved:ns})}else{toast('Неверно','err');set({tRes:{ok}})}}
function nextCase(){S.tIdx<CASES.length-1?set({tIdx:S.tIdx+1,tPick:null,tRes:null,tHint:false}):set({tIdx:CASES.length})}
function jumpCase(i){if(!S.tRes)set({tIdx:i,tPick:null,tRes:null,tHint:false})}
function openLesson(i){set({lLesson:i,lCaseIdx:0,lCasePick:null,lCaseFB:false})}
function pickLC(i){if(!S.lCaseFB)set({lCasePick:i})}
function checkLC(){if(S.lCasePick===null)return;set({lCaseFB:true})}
function nextLC(){set({lCaseIdx:S.lCaseIdx+1,lCasePick:null,lCaseFB:false})}
function completeLesson(i){const ns=new Set(S.lCompleted);ns.add(i);set({lCompleted:ns});toast('Урок '+(i+1)+' изучен ✓','info')}

// Keyboard support
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&['entry','control','trainer'].includes(S.scr))set({scr:'dash'});
  if(['entry','control'].includes(S.scr)&&!S.eFB&&!S.cFB){
    const map={1:'a',2:'b',3:'c',4:'d'};
    if(map[e.key]){const isE=S.scr==='entry';isE?set({ePick:map[e.key]}):set({cPick:map[e.key]})}
  }
});

function chatGo(k){
  if(k==='do_login'){set({scr:'login'});CS.open=false;}
  else if(k==='do_learn'){set({scr:S.user?'learn':'login',lLesson:-1});CS.open=false;}
  else if(k==='do_knowledge'){set({scr:S.user?'knowledge':'login',kbDoc:null});CS.open=false;}
  else if(k==='_login'){set({scr:'login'});CS.open=false;}
}
function fmtMsg(t){return t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');}
function renderChat(){
  const el=document.getElementById('chat-root');if(!el)return;
  const qrs=CS.msgs.length>0&&!CS.loading?CS.msgs[CS.msgs.length-1].qr:[];
  el.innerHTML=`
    <button class="chat-fab ${CS.unread>0&&!CS.open?'unread':''}" onclick="toggleChat()" title="Ассистент" style="display:${CS.open?'none':'flex'}">✨</button>
    <div class="chat-panel ${CS.open?'open':''}">
      <div class="chat-hdr">
        <div class="chat-av">✨</div>
        <div class="chat-hdr-info"><div class="chat-nm">Ассистент</div><div class="chat-st">Онлайн · Метролог.ПРО</div></div>
        <button class="chat-x" onclick="toggleChat()">✕</button>
      </div>
      <div class="chat-msgs" id="cmsg-list">
        ${CS.msgs.map(m=>`<div class="cmsg ${m.r}">${m.r==='bot'?'<div class="cmsg-av">✨</div>':''}<div class="cbubble ${m.r}">${fmtMsg(m.t)}</div></div>`).join('')}
        ${CS.loading?`<div class="cmsg bot"><div class="cmsg-av">✨</div><div class="chat-typing"><span></span><span></span><span></span></div></div>`:''}
      </div>
      ${qrs.length?`<div class="chat-qrs">${qrs.map(q=>`<button class="chat-qr" onclick="doQR('${q.k}','${q.l.replace(/'/g,"\\'")}')">${q.l}</button>`).join('')}</div>`:''}
      <div class="chat-inp-row">
        <input class="chat-inp" id="chat-input" placeholder="Написать…" value="${CS.input.replace(/"/g,'&quot;')}"
          oninput="CS.input=this.value" onkeydown="if(event.key==='Enter'){event.preventDefault();doSend()}">
        <button class="chat-snd" onclick="doSend()" ${CS.loading||!CS.input.trim()?'disabled':''}>↑</button>
      </div>
    </div>`;
  const ml=document.getElementById('cmsg-list');
  if(ml)ml.scrollTop=ml.scrollHeight;
}
function toggleChat(){
  CS.open=!CS.open;CS.unread=0;
  if(CS.open&&!CS.greeted){CS.greeted=true;CS.loading=true;renderChat();
    setTimeout(()=>{CS.loading=false;CS.msgs.push({r:'bot',t:BOT.greeting.text,qr:BOT.greeting.qr});renderChat();},800);}
  else renderChat();
}
function botReply(key){
  const r=BOT[key]||BOT.default;CS.loading=true;renderChat();
  setTimeout(()=>{CS.loading=false;CS.msgs.push({r:'bot',t:r.text,qr:r.qr||[]});
    if(!CS.open)CS.unread++;chatGo(key);renderChat();},600+Math.random()*400);
}
function doQR(key,label){
  if(CS.msgs.length)CS.msgs[CS.msgs.length-1].qr=[];
  CS.msgs.push({r:'user',t:label,qr:[]});botReply(key);
}
function doSend(){
  const msg=CS.input.trim();if(!msg||CS.loading)return;
  if(CS.msgs.length)CS.msgs[CS.msgs.length-1].qr=[];
  CS.msgs.push({r:'user',t:msg,qr:[]});CS.input='';renderChat();
  const lc=msg.toLowerCase();
  let key='default';
  if(/программ|курс|этап/i.test(lc))key='about';
  else if(/начал|начать|с чего/i.test(lc))key='start';
  else if(/что такое|повер|пч|плотномер/i.test(lc))key='what_is';
  else if(/учебн|материал|урок/i.test(lc))key='learn';
  else if(/тренаж|ошибк/i.test(lc))key='trainer';
  else if(/мпи|межповерочн/i.test(lc))key='mpi';
  else if(/база знаний|норматив|нд/i.test(lc))key='knowledge';
  else if(/войт|вход|регистр/i.test(lc))key='do_login';
  botReply(key);
}
function maybeAutoGreet(){
  if(S.scr==='landing'&&!CS.greeted){
    setTimeout(()=>{if(S.scr!=='landing')return;
      CS.open=true;CS.greeted=true;CS.loading=true;renderChat();
      setTimeout(()=>{CS.loading=false;CS.msgs.push({r:'bot',t:BOT.greeting.text,qr:BOT.greeting.qr});renderChat();},1000);
    },2200);
  }
}

  // ── 10 орбит — Apple Intelligence palette для триколора ───────────────────
  const ORBS=[
    // Глубокие синие (основа)
    {bx:.22,by:.32,rf:.68,rx:1.0,ry:0.85,rgb:[0,45,140],   ph:[0.0,1.2],sp:[.20,.15],ar:0.30},
    {bx:.72,by:.58,rf:.58,rx:0.9,ry:1.10,rgb:[0,75,210],   ph:[2.0,0.8],sp:[.17,.23],ar:-.40},
    {bx:.48,by:.82,rf:.52,rx:1.2,ry:0.72,rgb:[10,100,250], ph:[4.5,2.5],sp:[.28,.17],ar:0.80},
    // Алые и красные
    {bx:.82,by:.22,rf:.50,rx:1.0,ry:1.00,rgb:[200,18,18],  ph:[3.5,1.5],sp:[.24,.19],ar:0.00},
    {bx:.12,by:.68,rf:.44,rx:0.8,ry:1.30,rgb:[180,8,8],    ph:[1.5,3.5],sp:[.19,.28],ar:-.60},
    // Индиго / фиолет (переход)
    {bx:.62,by:.18,rf:.42,rx:1.1,ry:0.90,rgb:[55,25,175],  ph:[5.2,0.9],sp:[.14,.27],ar:0.50},
    // Светло-голубой (яркость, воздух)
    {bx:.33,by:.72,rf:.38,rx:1.3,ry:0.80,rgb:[90,155,255], ph:[0.8,4.0],sp:[.23,.15],ar:-.30},
    // Тёмно-синий (глубина)
    {bx:.55,by:.42,rf:.46,rx:0.7,ry:1.20,rgb:[0,12,55],    ph:[2.8,1.1],sp:[.11,.21],ar:0.90},
    // Розово-алый (тёплый акцент)
    {bx:.88,by:.78,rf:.36,rx:1.0,ry:1.00,rgb:[235,45,75],  ph:[1.0,2.0],sp:[.26,.13],ar:0.00},
    // Тёмно-красный (насыщенность)
    {bx:.06,by:.28,rf:.32,rx:0.9,ry:0.90,rgb:[155,0,0],    ph:[3.8,4.8],sp:[.15,.25],ar:0.20},
  ];

  const DRIFT=0.20, PULSE=0.09, SPEED=0.0018;
  let t=0;

  function draw(){
    if(!W||!H){_animFrame=requestAnimationFrame(draw);return;}
    ctx.clearRect(0,0,W,H);

    ORBS.forEach((orb,i)=>{
      const sx=Math.sin(t*orb.sp[0]+orb.ph[0]);
      const sy=Math.cos(t*orb.sp[1]+orb.ph[1]);
      const cx=(orb.bx+sx*DRIFT)*W;
      const cy=(orb.by+sy*DRIFT)*H;
      const baseR=orb.rf*Math.min(W,H)*0.68;
      const r=baseR*(1+Math.sin(t*0.55+i*0.9)*PULSE);
      const ang=orb.ar+t*0.06;

      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(ang);
      ctx.scale(orb.rx,orb.ry);

      const g=ctx.createRadialGradient(0,0,0,0,0,r);
      const [rv,gv,b]=orb.rgb;
      g.addColorStop(0.00,`rgba(${rv},${gv},${b},0.85)`);
      g.addColorStop(0.25,`rgba(${rv},${gv},${b},0.60)`);
      g.addColorStop(0.55,`rgba(${rv},${gv},${b},0.25)`);
      g.addColorStop(0.80,`rgba(${rv},${gv},${b},0.07)`);
      g.addColorStop(1.00,`rgba(${rv},${gv},${b},0.00)`);

      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.restore();
    });

    // Мягкая виньетка по краям
    const vx=ctx.createRadialGradient(W*.5,H*.5,H*.15,W*.5,H*.5,H*.95);
    vx.addColorStop(0,'rgba(255,255,255,0)');
    vx.addColorStop(1,'rgba(255,255,255,0.52)');
    ctx.fillStyle=vx;ctx.fillRect(0,0,W,H);

    t+=SPEED;
    _animFrame=requestAnimationFrame(draw);
  }

  canvas.classList.remove('ready');
  requestAnimationFrame(()=>{canvas.classList.add('ready');draw();});
}

render();
maybeAutoGreet();
</script></body></html>
