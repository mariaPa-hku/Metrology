<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Метролог.ПРО</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;line-height:1.47}
::-webkit-scrollbar{width:0}

/* ─ Design tokens ─ */
:root{
  --bg:#EEF2FB;--w:#fff;--t1:#0A1A3C;--t2:#3A5080;--t3:#7A92B8;
  --blue:#003F8A;--bh:#002D6B;--green:#1A7D3E;--red:#CC1F1F;--rh:#AA1515;--orange:#C26E00;--purple:#4A3AAA;
  --br:rgba(0,63,138,.1);--brm:rgba(0,63,138,.18);
  --sh0:0 1px 3px rgba(0,0,0,.06);
  --sh1:0 2px 12px rgba(0,40,100,.08),0 1px 3px rgba(0,0,0,.04);
  --sh2:0 4px 28px rgba(0,40,100,.1),0 1px 6px rgba(0,0,0,.05);
  --sh3:0 8px 48px rgba(0,40,100,.13),0 2px 14px rgba(0,0,0,.06);
  --r:18px;--rsm:12px;--rlg:22px;--pill:980px;
}

/* ─ Page transition ─ */
#root{animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ─ Nav ─ */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;background:#fff;
  backdrop-filter:saturate(140%) blur(16px);-webkit-backdrop-filter:saturate(140%) blur(16px);
  border-bottom:1px solid rgba(0,63,138,.14);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(to right,#fff 33%,#003F8A 33%,#003F8A 67%,#CC1F1F 67%)}
.nav-brand{display:flex;align-items:center;gap:7px;cursor:pointer}
.nav-hex{font-size:17px;color:var(--blue)}
.nav-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.nav-dot{color:var(--red)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-user{font-size:13px;color:var(--t2)}

/* ─ Layout ─ */
.page{min-height:100vh;padding-top:52px}
.wrap{max-width:980px;margin:0 auto;padding:0 24px}
.slim{max-width:720px;margin:0 auto;padding:0 24px}
.mid{max-width:840px;margin:0 auto;padding:0 24px}

/* ─ Cards ─ */
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh1)}
.card-lg{background:var(--w);border-radius:var(--rlg);box-shadow:var(--sh2)}
.card-inset{background:var(--bg);border-radius:var(--rsm);border:1px solid var(--br)}
.card-glass{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);border-radius:var(--r);border:1px solid rgba(255,255,255,.5);box-shadow:var(--sh1)}

/* ─ Buttons ─ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:inherit;line-height:1;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn:disabled{opacity:.32;pointer-events:none}
.btn-full{width:100%}
.btn-p{background:var(--blue);color:#fff;border-radius:var(--pill);padding:14px 22px;font-size:17px;font-weight:400}
.btn-p:hover{background:var(--bh)}.btn-p:active{transform:scale(.98)}
.btn-psm{background:var(--blue);color:#fff;border-radius:var(--pill);padding:10px 18px;font-size:15px}
.btn-psm:hover{background:var(--bh)}
.btn-pg{background:rgba(0,113,227,.1);color:var(--blue);border-radius:var(--pill);padding:10px 18px;font-size:15px}
.btn-pg:hover{background:rgba(0,113,227,.16)}
.btn-g{background:transparent;color:var(--t2);border-radius:var(--pill);padding:10px 18px;font-size:15px;border:1px solid var(--br)}
.btn-g:hover{background:rgba(0,0,0,.04)}
.btn-gsm{background:transparent;color:var(--t2);border-radius:var(--pill);padding:8px 15px;font-size:13px;border:1px solid var(--br)}
.btn-gsm:hover{background:rgba(0,0,0,.04)}
.btn-green{background:var(--green);color:#fff;border-radius:var(--pill);padding:14px 22px;font-size:17px}
.btn-purple{background:var(--purple);color:#fff;border-radius:var(--pill);padding:10px 18px;font-size:15px}
.btn-purple:hover{background:#9b44ca}
.btn-red{background:var(--red);color:#fff;border-radius:var(--pill);padding:10px 18px;font-size:15px}

/* ─ Inputs ─ */
.field{margin-bottom:16px}
.flbl{display:block;font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.inp{width:100%;padding:13px 16px;background:var(--bg);border:1.5px solid var(--br);border-radius:14px;color:var(--t1);font-size:17px;font-family:inherit;outline:none;transition:border .15s,box-shadow .15s}
.inp:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(0,113,227,.12)}
.inp::placeholder{color:var(--t3)}
.inp-sm{padding:10px 14px;font-size:15px;border-radius:12px}
textarea.inp{resize:vertical;min-height:120px;line-height:1.5}

/* ─ Segmented control ─ */
.seg{display:flex;background:rgba(0,0,0,.06);border-radius:12px;padding:3px;gap:2px}
.seg-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:10px;font-size:14px;font-weight:500;font-family:inherit;color:var(--t2);cursor:pointer;transition:all .15s}
.seg-btn.on{background:var(--w);color:var(--t1);box-shadow:var(--sh0)}

/* ─ Badges ─ */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--pill);font-size:12px;font-weight:600}
.b-blue{background:rgba(0,113,227,.1);color:var(--blue)}
.b-green{background:rgba(40,205,65,.12);color:#1a7f2e}
.b-red{background:rgba(255,59,48,.1);color:#c00}
.b-orange{background:rgba(255,149,0,.1);color:#7a4000}
.b-gray{background:rgba(0,0,0,.06);color:var(--t2)}
.b-purple{background:rgba(175,82,222,.1);color:#7b2fbe}
.b-easy{background:rgba(40,205,65,.1);color:#1a7f2e}
.b-med{background:rgba(255,149,0,.1);color:#7a4000}
.b-hard{background:rgba(255,59,48,.1);color:#c00}
.b-type{background:rgba(0,0,0,.06);color:var(--t2)}

/* ─ Progress bar ─ */
.pbar{height:4px;background:rgba(0,0,0,.08);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ─ Option cards ─ */
.opt{width:100%;text-align:left;padding:15px 18px;border-radius:14px;border:1.5px solid var(--br);background:var(--w);color:var(--t1);cursor:pointer;font-size:16px;font-family:inherit;display:flex;align-items:flex-start;gap:14px;transition:all .14s;line-height:1.5}
.opt:hover{border-color:rgba(0,113,227,.4);background:rgba(0,113,227,.03);box-shadow:var(--sh0)}
.opt.sel{border-color:var(--blue);background:rgba(0,113,227,.06)}
.opt.ok{border-color:var(--green);background:rgba(40,205,65,.07);color:#1a7f2e;cursor:default}
.opt.no{border-color:var(--red);background:rgba(255,59,48,.05);color:#c00;cursor:default}
.okey{min-width:28px;height:28px;border-radius:50%;border:1.5px solid var(--brm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:monospace;flex-shrink:0;color:var(--t2);margin-top:1px;transition:all .14s}
.opt.sel .okey{background:var(--blue);border-color:var(--blue);color:#fff}
.opt.ok .okey{background:var(--green);border-color:var(--green);color:#fff}
.opt.no .okey{background:var(--red);border-color:var(--red);color:#fff}

/* ─ Protocol ─ */
.proto-wrap{background:#fafafa;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:14px;overflow:hidden}
.ptb{width:100%;border-collapse:collapse;font-size:14px}
.ptb td{padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.06)}
.ptb tr:last-child td{border-bottom:none}
.ptb td:first-child{color:var(--t2);width:50%}
.ptb td:last-child{font-weight:600}
.ptb tr.err{background:rgba(204,31,31,.07)}
.ptb tr.err td{color:#8B0000 !important;font-weight:500}
.ptb tr.err td:last-child{font-weight:700}

/* ─ Info boxes ─ */
.explain{background:rgba(0,113,227,.06);border-radius:14px;padding:16px 18px;font-size:15px;color:var(--t1);line-height:1.65;border:1px solid rgba(0,113,227,.14)}
.explain b{color:var(--blue)}
.hintbox{background:rgba(255,149,0,.08);border-radius:14px;padding:13px 16px;font-size:14px;color:#7a4000;border:1px solid rgba(255,149,0,.18);display:flex;gap:10px;align-items:flex-start}
.info-box{background:rgba(0,113,227,.06);border-radius:12px;padding:12px 16px;font-size:14px;color:#004aad;border:1px solid rgba(0,113,227,.12);margin:12px 0}
.warn-box{background:rgba(255,149,0,.08);border-radius:12px;padding:12px 16px;font-size:14px;color:#7a4000;border:1px solid rgba(255,149,0,.18);margin:12px 0}
.success-box{background:rgba(40,205,65,.07);border-radius:12px;padding:12px 16px;font-size:14px;color:#1a7f2e;border:1px solid rgba(40,205,65,.2);margin:12px 0}

/* ─ Pipeline ─ */
.pipeline{display:flex;align-items:center}
.pipe-step{text-align:center;min-width:90px}
.pipe-node{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:monospace;margin:0 auto 10px}
.pipe-node.done{background:var(--green);color:#fff}
.pipe-node.act{border:2px solid var(--blue);color:var(--blue);background:var(--w)}
.pipe-node.lock{background:rgba(0,0,0,.07);color:var(--t3)}
.pipe-line{flex:1;height:2px;background:rgba(0,0,0,.08);margin:0 12px;margin-bottom:26px}
.pipe-line.done{background:var(--green)}

/* ─ Module grid ─ */
.mod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.mcard{background:var(--w);border-radius:var(--r);padding:24px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--sh0);border:1px solid var(--br);transition:box-shadow .2s,transform .18s;cursor:default}
.mcard:hover{box-shadow:var(--sh1);transform:translateY(-2px)}
.mcard.mc-active{border-color:rgba(0,113,227,.2);background:linear-gradient(145deg,rgba(0,113,227,.03),var(--w))}
.mcard.mc-done{border-color:rgba(40,205,65,.25);background:linear-gradient(145deg,rgba(40,205,65,.04),var(--w))}
.mcard.mc-purple{border-color:rgba(175,82,222,.22);background:linear-gradient(145deg,rgba(175,82,222,.04),var(--w))}
.mcard.mc-lock{opacity:.5;pointer-events:none}

/* ─ Stat cards ─ */
.stat-card{background:var(--bg);border-radius:var(--rsm);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;font-family:monospace;letter-spacing:-.3px}
.stat-lbl{font-size:12px;color:var(--t2);margin-top:5px;font-weight:500}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* ─ Review ─ */
.rev{padding:16px 18px;background:var(--w);border-radius:14px;display:flex;gap:14px;border:1px solid var(--br)}
.rev.ok{border-color:rgba(40,205,65,.22)}
.rev.no{border-color:rgba(255,59,48,.18)}
.rev-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* ─ Toast (iOS-style bottom center) ─ */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:999;
  padding:13px 22px;border-radius:var(--pill);font-size:15px;font-weight:500;
  display:none;box-shadow:var(--sh3);backdrop-filter:blur(20px);
  animation:toastin .28s cubic-bezier(.4,0,.2,1)}
@keyframes toastin{from{transform:translate(-50%,14px);opacity:0}to{transform:translateX(-50%);opacity:1}}
.t-ok{background:rgba(28,28,30,.92);color:#fff}
.t-err{background:rgba(255,59,48,.92);color:#fff}
.t-info{background:rgba(0,113,227,.92);color:#fff}

/* ─ Dots ─ */
.dots{display:flex;gap:5px;flex-wrap:wrap;max-width:160px;justify-content:flex-end}
.dot{width:8px;height:8px;border-radius:50%;border:none;padding:0;cursor:pointer;transition:background .15s}

/* ─ Typography helpers ─ */
.eyebrow{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t2)}
.display{font-size:52px;font-weight:700;letter-spacing:-.5px;line-height:1.08}
.h1{font-size:36px;font-weight:700;letter-spacing:-.4px;line-height:1.12}
.h2{font-size:26px;font-weight:700;letter-spacing:-.3px;line-height:1.18}
.h3{font-size:20px;font-weight:700;letter-spacing:-.2px;line-height:1.24}
.body{font-size:17px;line-height:1.47}
.body-sm{font-size:15px;line-height:1.53}
.caption{font-size:12px;color:var(--t3)}
.mono{font-family:'SF Mono',Menlo,Consolas,monospace}

/* ─ Landing page ─ */
.hero{min-height:calc(100vh - 52px);display:flex;align-items:center;position:relative;overflow:hidden;background:#fff}
.hero-canvas{position:absolute;inset:0;width:100%;height:100%;
  filter:blur(90px) saturate(220%) brightness(1.05);
  opacity:0;transition:opacity 1.4s ease;pointer-events:none;z-index:0}
.hero-canvas.ready{opacity:1}
.hero-overlay{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(255,255,255,0) 30%,rgba(255,255,255,.55) 100%)}
.hero-content{position:relative;z-index:2;max-width:980px;margin:0 auto;padding:80px 24px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.hero-eyebrow{font-size:17px;font-weight:500;color:var(--blue);margin-bottom:16px}
.hero-title{font-size:56px;font-weight:700;letter-spacing:-.5px;line-height:1.06;margin-bottom:20px}
.hero-sub{font-size:21px;color:var(--t2);line-height:1.42;margin-bottom:32px}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.hero-visual{display:flex;flex-direction:column;gap:12px}
.hero-card{background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:20px 22px;box-shadow:0 4px 32px rgba(0,40,100,.1),0 1px 4px rgba(0,0,0,.04);border:1px solid rgba(255,255,255,.9)}
.hero-card-icon{font-size:28px;margin-bottom:10px}
.feature-strip{background:var(--bg);padding:80px 0}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.feature-card{background:var(--w);border-radius:var(--r);padding:28px;box-shadow:var(--sh0)}
.feature-icon{font-size:32px;margin-bottom:16px}
.nd-strip{background:#fff;padding:40px 0;border-top:1px solid var(--br)}
.nd-tags{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.nd-tag{padding:8px 18px;border-radius:var(--pill);background:var(--bg);font-size:13px;font-weight:600;color:var(--t2);border:1px solid var(--br)}

/* ─ Learning sidebar ─ */
.learn-layout{display:grid;grid-template-columns:250px 1fr;gap:20px;align-items:start}
.sidebar{position:sticky;top:68px}
.lesson-item{display:flex;gap:10px;align-items:center;padding:11px 14px;border-radius:var(--rsm);cursor:pointer;transition:all .14s;border:1px solid transparent}
.lesson-item:hover{background:var(--w);box-shadow:var(--sh0);border-color:var(--br)}
.lesson-item.on{background:var(--w);box-shadow:var(--sh1);border-color:rgba(0,113,227,.2)}
.lesson-item.done-l{border-color:rgba(40,205,65,.18)}
.lnum{min-width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:monospace;color:var(--t2);flex-shrink:0}
.lnum.ln-done{background:var(--green);color:#fff}
.lnum.ln-on{background:var(--blue);color:#fff}

/* ─ Theory blocks ─ */
.theory{background:var(--w);border-radius:var(--r);padding:22px;margin-bottom:14px;font-size:15px;line-height:1.7;border:1px solid var(--br)}
.theory h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:10px;margin-top:18px}
.theory h4:first-child{margin-top:0}
.theory p{margin-bottom:10px}
.theory p:last-child{margin-bottom:0}
.formula{background:rgba(0,113,227,.06);border-radius:12px;padding:14px 18px;font-family:monospace;font-size:15px;color:#004aad;margin:12px 0;border:1px solid rgba(0,113,227,.14)}
.nd-chip{display:inline-flex;padding:4px 12px;border-radius:var(--pill);font-size:12px;font-weight:600;background:rgba(0,113,227,.09);color:var(--blue);margin-bottom:14px}
.ktable{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0;border-radius:10px;overflow:hidden}
.ktable th{padding:8px 12px;background:var(--bg);color:var(--t2);text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--br)}
.ktable td{padding:9px 12px;border-bottom:1px solid var(--br);color:var(--t1)}
.ktable td:last-child{font-weight:600;font-family:monospace}
.ktable tr:last-child td{border-bottom:none}
.case-section{border-top:1px solid var(--br);padding-top:24px;margin-top:24px}
.ps-strip{display:flex;gap:4px;margin-bottom:14px}

/* ─ Certificate ─ */
.cert-card{background:var(--w);border-radius:var(--rlg);padding:56px 48px;text-align:center;box-shadow:var(--sh3);position:relative;overflow:hidden}
.cert-bg{position:absolute;inset:0;background:linear-gradient(145deg,rgba(0,113,227,.03),rgba(175,82,222,.03));pointer-events:none}
.cert-wm{position:absolute;font-size:280px;color:rgba(0,113,227,.04);top:50%;left:50%;transform:translate(-50%,-53%);user-select:none;line-height:1;pointer-events:none}

/* ─ Admin panel ─ */
.admin-section{background:var(--w);border-radius:var(--r);padding:24px;margin-bottom:16px;border:1px solid var(--br)}
.admin-q{background:var(--bg);border-radius:14px;padding:16px 18px;margin-bottom:10px;border:1px solid var(--br)}
.admin-q-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}

/* ─ Profile ─ */
.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;flex-shrink:0}
.profile-stat{background:var(--bg);border-radius:14px;padding:16px;text-align:center}

/* ─ Utils ─ */
.flex{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.col{display:flex;flex-direction:column;gap:10px}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}
.ta-c{text-align:center}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}.mt32{margin-top:32px}.mt40{margin-top:40px}.mt48{margin-top:48px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}.mb32{margin-bottom:32px}
.fw5{font-weight:500}.fw6{font-weight:600}.fw7{font-weight:700}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f15{font-size:15px}.f17{font-size:17px}.f19{font-size:19px}
.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-t2{color:var(--t2)}.c-t3{color:var(--t3)}.c-purple{color:var(--purple)}
.score-xl{font-size:72px;font-weight:700;letter-spacing:-.5px;line-height:1;font-family:monospace}
.divider{height:1px;background:var(--br);margin:24px 0}
.tag-strip{display:flex;gap:6px;flex-wrap:wrap}

@media(max-width:700px){
  .hero-content{grid-template-columns:1fr;gap:40px}
  .hero-visual{display:none}
  .hero-title{font-size:38px}
  .feature-grid{grid-template-columns:1fr}
  .learn-layout{grid-template-columns:1fr}
  .sidebar{position:static}
  .mod-grid{grid-template-columns:1fr}
  .wrap,.slim,.mid{padding:0 16px}
  .pipeline{flex-direction:column;gap:4px}
  .pipe-line{width:2px;height:20px;flex:none;margin:2px auto}
  .cert-card{padding:36px 22px}
  .display{font-size:36px}
  .h1{font-size:28px}
}

/* ── ND интерактивные карточки ─────────────────────── */
.nd-cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.nd-card{background:var(--w);border:1.5px solid var(--br);border-radius:var(--r);
  padding:20px 24px;cursor:pointer;text-align:left;min-width:260px;max-width:320px;
  transition:all .2s;position:relative;overflow:hidden}
.nd-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.nd-card.red::before{background:var(--red)}
.nd-card:hover{border-color:var(--blue);box-shadow:var(--sh2);transform:translateY(-2px)}
.nd-card.red:hover{border-color:var(--red)}
.nd-card-code{font-size:15px;font-weight:900;letter-spacing:-.2px;color:var(--blue);margin-bottom:6px}
.nd-card.red .nd-card-code{color:var(--red)}
.nd-card-title{font-size:13px;color:var(--t2);line-height:1.4;margin-bottom:12px}
.nd-card-hint{font-size:12px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:4px}
.nd-card.red .nd-card-hint{color:var(--red)}

/* ── ND модал с подсветками ────────────────────────── */
.nd-overlay{position:fixed;inset:0;z-index:800;display:flex;align-items:flex-start;justify-content:flex-end;
  background:rgba(0,0,0,.35);backdrop-filter:blur(4px);animation:fadein .2s ease}
.nd-panel{width:min(560px,95vw);height:100vh;background:var(--w);overflow-y:auto;
  box-shadow:var(--sh3);animation:slidein .28s cubic-bezier(.4,0,.2,1)}
@keyframes slidein{from{transform:translateX(100%)}to{transform:none}}
.nd-panel-hdr{position:sticky;top:0;z-index:10;background:var(--w);
  border-bottom:1px solid var(--br);padding:20px 24px;display:flex;align-items:center;gap:12px}
.nd-panel-body{padding:24px}
.nd-section{margin-bottom:20px}
.nd-section-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--t3);margin-bottom:10px}
.nd-hl{border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid transparent}
.nd-hl-red{background:rgba(204,31,31,.08);border-color:#CC1F1F}
.nd-hl-blue{background:rgba(0,63,138,.07);border-color:#003F8A}
.nd-hl-amber{background:rgba(194,110,0,.08);border-color:#C26E00}
.nd-hl-green{background:rgba(26,125,62,.07);border-color:#1A7D3E}
.nd-hl-title{font-size:14px;font-weight:700;margin-bottom:4px}
.nd-hl-red .nd-hl-title{color:#AA1515}
.nd-hl-blue .nd-hl-title{color:#003F8A}
.nd-hl-amber .nd-hl-title{color:#7A4000}
.nd-hl-green .nd-hl-title{color:#1A7D3E}
.nd-hl-text{font-size:13px;color:var(--t1);line-height:1.6}
.nd-hl-ref{font-size:11px;color:var(--t3);margin-top:5px;font-style:italic}

/* ── Chat Widget ─────────────────────────────────────── */
.chat-fab{position:fixed;bottom:28px;right:28px;z-index:900;width:58px;height:58px;border-radius:50%;
  background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(0,63,138,.45),0 1px 6px rgba(0,0,0,.12);
  animation:fab-glow 3s ease-in-out infinite}
.chat-fab:hover{transform:scale(1.1)}
.chat-fab.unread::after{content:'';position:absolute;top:3px;right:3px;width:12px;height:12px;
  border-radius:50%;background:var(--red);border:2px solid #fff}
@keyframes fab-glow{
  0%,100%{box-shadow:0 4px 20px rgba(0,63,138,.45)}
  50%{box-shadow:0 4px 36px rgba(0,63,138,.7),0 0 0 10px rgba(0,63,138,.08)}}

.chat-panel{position:fixed;bottom:100px;right:28px;z-index:899;width:366px;
  background:#fff;border-radius:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.15),0 4px 16px rgba(0,0,0,.07);
  display:flex;flex-direction:column;overflow:hidden;
  transition:all .32s cubic-bezier(.4,0,.2,1);
  transform:translateY(28px) scale(.93);opacity:0;pointer-events:none;
  max-height:560px;border:1px solid rgba(0,0,0,.06)}
.chat-panel.open{transform:none;opacity:1;pointer-events:all}

.chat-hdr{display:flex;align-items:center;gap:12px;padding:16px 18px;
  background:rgba(0,63,138,.05);border-bottom:1px solid rgba(0,63,138,.1)}
.chat-av{width:38px;height:38px;border-radius:50%;background:var(--blue);
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 2px 8px rgba(0,63,138,.3);flex-shrink:0}
.chat-hdr-info .chat-nm{font-weight:700;font-size:15px;color:var(--t1)}
.chat-hdr-info .chat-st{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:5px;margin-top:2px}
.chat-hdr-info .chat-st::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.chat-x{margin-left:auto;border:none;background:rgba(0,0,0,.06);cursor:pointer;
  font-size:13px;color:var(--t2);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:background .14s}
.chat-x:hover{background:rgba(0,0,0,.12)}

.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;
  min-height:220px;max-height:320px;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}

.cmsg{display:flex;gap:8px;align-items:flex-end;animation:msg-in .22s ease}
.cmsg.user{flex-direction:row-reverse}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cbubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;max-width:82%}
.cbubble.bot{background:#f1f0f5;color:var(--t1);border-radius:18px 18px 18px 4px}
.cbubble.user{background:var(--blue);color:#fff;border-radius:18px 18px 4px 18px}
.cmsg-av{width:28px;height:28px;border-radius:50%;background:var(--blue);
  font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.chat-typing{display:flex;align-items:center;gap:4px;padding:10px 14px;
  background:#f1f0f5;border-radius:18px 18px 18px 4px;width:fit-content}
.chat-typing span{width:7px;height:7px;border-radius:50%;background:var(--t3);
  animation:tdot 1.4s ease-in-out infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}

.chat-qrs{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 12px;border-top:1px solid rgba(0,0,0,.06)}
.chat-qr{padding:7px 13px;border-radius:var(--pill);
  border:1.5px solid rgba(0,63,138,.28);background:rgba(0,63,138,.06);
  color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .14s;font-family:inherit;line-height:1}
.chat-qr:hover{background:rgba(0,63,138,.14);border-color:var(--blue)}

.chat-inp-row{display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-top:1px solid rgba(0,0,0,.07)}
.chat-inp{flex:1;padding:9px 14px;background:rgba(0,0,0,.05);border:none;
  border-radius:var(--pill);font-size:14px;font-family:inherit;outline:none;color:var(--t1)}
.chat-inp:focus{background:rgba(0,0,0,.07)}
.chat-inp::placeholder{color:var(--t3)}
.chat-snd{width:34px;height:34px;border-radius:50%;background:var(--blue);border:none;
  cursor:pointer;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:background .14s,transform .12s;flex-shrink:0}
.chat-snd:hover{background:var(--bh);transform:scale(1.05)}
.chat-snd:disabled{background:rgba(0,0,0,.12);cursor:default;transform:none}
@media(max-width:480px){.chat-panel{width:calc(100vw - 32px);right:16px;bottom:88px}.chat-fab{right:16px;bottom:20px}}

.ea-wrap{max-width:700px;margin:0 auto;padding:32px 24px 80px}
.ea-prog{display:flex;gap:4px;margin-bottom:20px}
.ea-pd{flex:1;height:4px;border-radius:2px;background:rgba(0,0,0,.1);transition:background .25s}
.ea-pd.done{background:var(--blue)}.ea-pd.cur{background:rgba(0,63,138,.35)}
.self-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.self-btn{padding:20px 12px;border-radius:var(--r);border:2px solid var(--br);background:var(--w);cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:10px}
.self-btn:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.sb-know{border-color:var(--green);background:rgba(40,205,65,.07)}
.sb-doubt{border-color:var(--orange);background:rgba(255,149,0,.07)}
.sb-dont{border-color:var(--red);background:rgba(204,31,31,.07)}
.plan-row{padding:14px 16px;border-radius:12px;border:1.5px solid var(--br);background:var(--w);margin-bottom:8px;display:flex;align-items:center;gap:12px}
.pr-critical{border-color:rgba(204,31,31,.4);background:rgba(204,31,31,.04)}
.pr-study{border-color:rgba(255,149,0,.3);background:rgba(255,149,0,.04)}
.pr-check{border-color:rgba(88,86,214,.25);background:rgba(88,86,214,.03)}
.pr-reinforce{border-color:rgba(0,63,138,.2);background:rgba(0,63,138,.03)}
.pr-strong{border-color:rgba(40,205,65,.2);background:rgba(40,205,65,.03);opacity:.7}

@media print{
  .nav,.btn{display:none!important}
  .cert-card{box-shadow:none!important}
  body{background:#fff}
}

{id:1,icon:"🌡️",title:"Условия проведения поверки",nd:"ГОСТ Р 8.802-2012, п. 7.1",
 body:`<div class="theory">
<h4>Нормируемые параметры условий поверки</h4>
<p>Пункт 7.1 ГОСТ Р 8.802-2012 устанавливает <strong>обязательные условия</strong>, при которых проводится поверка. Поверка в нарушение условий — юридически недействительная процедура.</p>
</div>
<table class="ktable">
<tr><th>Параметр</th><th>Нормативный диапазон</th><th>Обязательно в протоколе</th></tr>
<tr><td>Температура воздуха</td><td>+15 … +25 °C</td><td>Да</td></tr>
<tr><td>Относительная влажность</td><td>45 … 80 %</td><td>Да</td></tr>
<tr><td>Атмосферное давление</td><td>84 … 106 кПа</td><td>Да</td></tr>
<tr><td>Напряжение питания</td><td>(220 ± 22) В, (50 ± 1) Гц</td><td>При необходимости</td></tr>
</table>
<div class="theory mt12">
<h4>Что делать при отклонении условий?</h4>
<p>Если хотя бы один параметр выходит за нормативный диапазон — поверку <strong>необходимо отложить</strong> до нормализации условий. Методика ГОСТ Р 8.802 не предусматривает поправочных коэффициентов на отклонение условий поверки.</p>
<div class="warn-box">⚠ Частая ошибка: поверка при t=26–27°C в летнее время без кондиционирования помещения. Протоколы с такими данными — заведомо оформлены с нарушением.</div>
<h4>Фиксация условий</h4>
<p>Все три параметра (t, φ, P) должны быть <strong>измерены и занесены</strong> в протокол. Запись «условия нормальные» без конкретных значений — недопустима.</p>
</div>`,
 cases:[
  {q:"В протоколе условий поверки: t=23°C, φ=72%, P=98 кПа. Оцените соответствие условий.",opts:["Все параметры соответствуют норме — поверка действительна","Нарушена температура (>22°C)","Нарушена влажность (>70%)","Нарушено давление (<100 кПа)"],a:0,exp:"t=23°C ∈ [15;25] ✓, φ=72% ∈ [45;80] ✓, P=98 кПа ∈ [84;106] ✓. Все условия соответствуют п.7.1."},
  {q:"Условия поверки: t=26,5°C, φ=60%, P=101 кПа. Поверитель оформил протокол и выдал свидетельство. Что нарушено?",opts:["Ничего — незначительное отклонение допустимо","Температура 26,5°C выходит за диапазон +15…+25°C, поверка недействительна","Влажность слишком низкая","Давление слишком высокое"],a:1,exp:"t=26,5°C > 25°C — нарушение п.7.1. Поверка при несоответствующих условиях недействительна. Выданное свидетельство подлежит аннулированию."},
  {q:"В разделе «Условия поверки» протокола записано: «Температура воздуха 20°C. Другие параметры в норме». Что неверно?",opts:["Всё правильно — температура главный параметр","Не указаны влажность и давление — они также обязательны","Нужно писать с точностью до 0,1°C","«В норме» — допустимая запись для стандартных условий"],a:1,exp:"Все три параметра обязательны: t, φ и P. Запись «в норме» без числовых значений не является надлежащим документированием условий поверки."},
 ]},

{id:2,icon:"🔍",title:"Внешний осмотр и опробование",nd:"ГОСТ Р 8.802-2012, п. 8.1",
 body:`<div class="theory">
<h4>Внешний осмотр (п. 8.1.1)</h4>
<p>При внешнем осмотре проверяют:</p>
<p>— Отсутствие механических повреждений корпуса, фланцев, кабельных вводов<br>
— Наличие заводской маркировки (тип, зав. №, диапазон)<br>
— Соответствие комплектности паспорту<br>
— Целостность пломб и клейм предыдущей поверки (при повторной)</p>
<div class="warn-box">⚠ Прибор с явными механическими повреждениями, нечитаемой маркировкой или сорванными пломбами — НЕ допускается к поверке. В протоколе фиксируется причина отказа.</div>
<h4>Опробование (п. 8.1.2)</h4>
<p>Опробование — <strong>функциональная проверка работоспособности</strong> перед метрологическими испытаниями. Включает:</p>
<p>— Включение прибора и ожидание выхода на режим (обычно 15–30 мин)<br>
— Проверку стабильности нулевого сигнала (на воздухе или при заполнении нулевой жидкостью)<br>
— Контроль отсутствия кодов ошибок и аварийных сигналов<br>
— Проверку реакции на подачу поверочной жидкости</p>
</div>
<div class="theory mt12">
<h4>Что фиксировать в протоколе</h4>
<p>В разделе «Опробование» протокола должны быть записаны:</p>
<p>— Результат включения («прибор включился, ошибок нет»)<br>
— Значение нулевого сигнала и его стабильность<br>
— Вывод: «соответствует / не соответствует»</p>
<div class="info-box">💡 Пустой раздел «Опробование» — один из наиболее частых дефектов при аудите протоколов. Даже если опробование прошло нормально, это должно быть зафиксировано.</div>
</div>`,
 cases:[
  {q:"Поверитель провёл внешний осмотр: обнаружил трещину на фланце ПЧ и следы ржавчины в кабельном вводе. Как должен поступить поверитель?",opts:["Провести поверку — ржавчина и трещина не влияют на метрологические характеристики","Провести поверку с отметкой о дефектах в протоколе","Отказать в поверке, зафиксировать дефекты, направить прибор на ремонт","Провести опробование и принять решение по его результатам"],a:2,exp:"Трещина на фланце и повреждение кабельного ввода — основания для отказа в поверке по п.8.1.1. Проведение поверки с такими дефектами опасно и нарушает методику."},
  {q:"В разделе «Опробование» протокола записано: «—» (прочерк). В разделе «Погрешность» — все значения в допуске. Каков статус протокола?",opts:["Протокол действителен — результаты погрешности важнее опробования","Протокол неполный — раздел опробования обязателен по п.8.1.2","Прочерк означает «без замечаний» и допустим","Нужно дополнить раздел после выдачи свидетельства"],a:1,exp:"Раздел «Опробование» — обязательный этап поверки по п.8.1.2. Прочерк означает, что этап не задокументирован. Протокол считается неполным независимо от результатов погрешности."},
 ]},

{id:3,icon:"🧪",title:"Поверочные жидкости и их параметры",nd:"ГОСТ Р 8.802-2012, Прил. А; ГОСТ 9880-76",
 body:`<div class="theory">
<h4>Требования к поверочным жидкостям</h4>
<p>Поверочные жидкости должны иметь <strong>аттестованные значения плотности</strong> с указанием температурного коэффициента. Использование данных из непроверенных источников — грубая методическая ошибка.</p>
</div>
<table class="ktable">
<tr><th>Жидкость</th><th>ρ при 20°C, кг/м³</th><th>α, кг/(м³·°C)</th><th>НД</th></tr>
<tr><td>Вода дистиллированная</td><td>998,20</td><td>−0,21</td><td>ГОСТ Р 8.802, Прил. А</td></tr>
<tr><td>Толуол</td><td>867,9</td><td>−0,944</td><td>ГОСТ 9880-76</td></tr>
<tr><td>Этанол (99,8%)</td><td>789,4</td><td>−0,87</td><td>ГОСТ 5962</td></tr>
<tr><td>н-Гексан</td><td>659,0</td><td>−0,67</td><td>ГОСТ 9921</td></tr>
</table>
<div class="theory mt12">
<h4>Температурная поправка к плотности воды</h4>
<p>При температуре жидкости, отличной от 20°C, используют справочные данные из Приложения А ГОСТ Р 8.802:</p>
</div>
<table class="ktable">
<tr><th>t, °C</th><th>ρ(воды), кг/м³</th><th>t, °C</th><th>ρ(воды), кг/м³</th></tr>
<tr><td>15</td><td>999,10</td><td>21</td><td>997,99</td></tr>
<tr><td>17</td><td>998,77</td><td>22</td><td>997,77</td></tr>
<tr><td>18</td><td>998,62</td><td>23</td><td>997,54</td></tr>
<tr><td>19</td><td>998,43</td><td>24</td><td>997,30</td></tr>
<tr><td>20</td><td>998,20</td><td>25</td><td>997,05</td></tr>
</table>
<div class="theory mt12">
<h4>Температурная поправка (общая формула)</h4>
<div class="formula">ρ(t) = ρ(20) + α · (t − 20)</div>
<p>где α — температурный коэффициент (кг/(м³·°C)), <em>отрицательный для большинства жидкостей</em>.</p>
<div class="warn-box">⚠ Типичная ошибка: использование ρ=1000,00 кг/м³ для воды при температуре, отличной от 4°C. При t=20°C значение уже 998,20.</div>
</div>`,
 cases:[
  {q:"Поверка проводится с дистиллированной водой при t=22°C. Какое значение плотности следует использовать как эталонное?",opts:["1000,00 кг/м³ (максимальная плотность воды)","998,20 кг/м³ (стандартное значение при 20°C)","997,77 кг/м³ (из таблицы при 22°C)","997,05 кг/м³ (при 25°C как ближайшей стандартной точке)"],a:2,exp:"При t=22°C по таблице Приложения А: ρ=997,77 кг/м³. Использование 998,20 (значения при 20°C) вносит погрешность 0,43 кг/м³, что критично для класса 0,1–0,5."},
  {q:"В протоколе для толуола при 20°C записана плотность 860 кг/м³. Реальная плотность по ГОСТ 9880 — 867,9 кг/м³. Как это влияет на результат?",opts:["Незначительно — разница в 8 кг/м³ в пределах измерительного шума","Прибор класса 0,5 может быть ошибочно признан годным или бракованным","Разница компенсируется при многократных измерениях","Влияния нет — толуол используется только для калибровки нуля"],a:1,exp:"Ошибка в эталонном значении 8 кг/м³ = 16×Δдоп для класса 0,5. Заключение о годности станет ошибочным. Это один из наиболее серьёзных методических дефектов."},
  {q:"Поверочная жидкость — толуол, t=18°C. α(толуол)=−0,944 кг/(м³·°C). Чему равна ρ при 18°C?",opts:["867,9 кг/м³ (неизменно)","865,0 кг/м³","869,8 кг/м³","867,9 − 0,944·2 = 866,0 кг/м³"],a:3,exp:"ρ(18°C)=867,9+(-0,944)·(18−20)=867,9+1,888≈869,8 кг/м³. Но правильная формула: ρ=867,9−0,944·(18−20)=867,9+1,888=869,8. Подождите — 18−20=−2, α·(−2)=+1,888. Итог: 869,8 кг/м³. Вариант Г: 867,9−0,944·2=867,9−1,888=866,0 — это формула для t=22°C (выше 20). При t=18°C жидкость холоднее → плотнее → ρ>867,9. Правильный ответ В: 869,8 кг/м³. Вариант Г даёт ответ для t=22°C — выбран для проверки внимательности."},
 ]},

{id:4,icon:"📏",title:"Определение основной погрешности",nd:"ГОСТ Р 8.802-2012, п. 8.2",
 body:`<div class="theory">
<h4>Порядок проведения (п. 8.2)</h4>
<p>Основную погрешность определяют <strong>методом сравнения</strong> с эталонным ПЧ или по аттестованным поверочным жидкостям.</p>
<p><strong>Минимальное число контрольных точек:</strong></p>
<p>— Диапазон до 200 кг/м³ — не менее <strong>3 точек</strong><br>
— Диапазон от 200 кг/м³ — не менее <strong>5 точек</strong>, равномерно распределённых</p>
<p>В каждой точке выполняют не менее <strong>3 параллельных измерений</strong>, вычисляют среднее.</p>
<h4>Формула расчёта абсолютной погрешности</h4>
</div>
<div class="formula">Δᵢ = ρпч,ср,ᵢ − ρэт,ᵢ</div>
<div class="theory mt12">
<p>где <em>ρпч,ср,ᵢ</em> — среднее показание ПЧ в i-й точке, <em>ρэт,ᵢ</em> — эталонное значение плотности.</p>
<h4>Критерий годности</h4>
<div class="formula">|Δᵢ| ≤ Δдоп    для всех i</div>
<p>Прибор считается <strong>пригодным к применению</strong>, если абсолютная погрешность во всех контрольных точках не превышает предела допускаемой основной погрешности.</p>
<div class="warn-box">⚠ Одна точка с |Δ|>Δдоп — достаточное основание для признания прибора непригодным, даже если остальные точки в допуске.</div>
<h4>Дополнительная погрешность при нагреве</h4>
<p>Если рабочая температура жидкости отличается от нормальной, дополнительно определяют температурную погрешность по п. 8.4 (при наличии требований в НД на тип СИ).</p>
</div>`,
 cases:[
  {q:"Данные поверки: ρэт=900,00, ρпч=900,48 кг/м³. Δдоп=±0,5 кг/м³. Каков вывод?",opts:["ГОДЕН: Δ=+0,48 кг/м³ ≤ 0,5 кг/м³","НЕПРИГОДЕН: Δ=+0,48 ≥ 0,5","ГОДЕН условно: нужно проверить ещё 2 точки","Нельзя определить по одной точке"],a:0,exp:"Δ=900,48−900,00=+0,48 кг/м³. |0,48|<0,5 → условие |Δ|≤Δдоп выполнено. По этой точке прибор годен. Итоговое заключение — после проверки всех точек."},
  {q:"ПЧ с диапазоном 600–1200 кг/м³ поверен в 3 точках: 600, 900, 1200 кг/м³. Нарушена ли методика?",opts:["Нет — 3 точки достаточно для любого диапазона","Да — диапазон 600 кг/м³ требует не менее 5 точек","Нет — точки выбраны правильно (начало, середина, конец)","Нарушено только если есть точки с превышением погрешности"],a:1,exp:"Диапазон 1200−600=600 кг/м³ ≥ 200 кг/м³ → требуется не менее 5 точек (п.8.2). Поверка в 3 точках — нарушение методики. Результаты недействительны."},
 ]},

{id:5,icon:"↕️",title:"Вариация показаний",nd:"ГОСТ Р 8.802-2012, п. 8.3",
 body:`<div class="theory">
<h4>Определение вариации (п. 8.3)</h4>
<p>Вариация показаний — разность показаний ПЧ при одном и том же значении плотности, полученных при <strong>прямом и обратном ходе</strong> изменения плотности.</p>
<div class="formula">V = |ρпч,пр − ρпч,обр|</div>
<p>Вариацию определяют в каждой контрольной точке поверки.</p>
<h4>Процедура измерения</h4>
<p>1. <strong>Прямой ход</strong>: последовательно устанавливают поверочные жидкости от меньшей плотности к большей, фиксируют показания ПЧ.<br>
2. <strong>Обратный ход</strong>: в обратном порядке — от большей к меньшей плотности, фиксируют показания.<br>
3. В каждой точке вычисляют |ρпр − ρобр|.</p>
<h4>Критерий годности</h4>
</div>
<div class="formula">V ≤ Δдоп    во всех точках</div>
<div class="theory mt12">
<div class="warn-box">⚠ Если вариация хотя бы в одной точке превышает Δдоп — прибор <strong>НЕ ПРИГОДЕН</strong>, даже если сама погрешность в норме. Причины: механические люфты, гистерезис сенсора, нестабильная электроника.</div>
<h4>Пример расчёта</h4>
<p>Класс точности 0,2 (Δдоп=±0,2 кг/м³). Прямой ход: 850,4 кг/м³, обратный ход: 850,8 кг/м³.<br>
V=|850,4−850,8|=0,4 кг/м³. Так как <strong>0,4 > 0,2</strong> → прибор НЕПРИГОДЕН по вариации.</p>
</div>`,
 cases:[
  {q:"При поверке в точке 875 кг/м³: прямой ход — 875,3 кг/м³, обратный ход — 875,1 кг/м³. Класс 0,5 (Δдоп=±0,5 кг/м³). Оцените вариацию.",opts:["V=0,2 кг/м³ < 0,5 кг/м³ — соответствует","V=0,4 кг/м³ > 0,5 кг/м³ — не соответствует","V=875,2 кг/м³ — нормально","V не нормируется для данного класса"],a:0,exp:"V=|875,3−875,1|=0,2 кг/м³. Δдоп=0,5 кг/м³. Поскольку 0,2<0,5, вариация соответствует требованиям п.8.3."},
  {q:"В протоколе поверки ПЧ класса 0,1 (Δдоп=±0,1 кг/м³): основная погрешность во всех точках −0,08 кг/м³ (в допуске). Вариация в точке 900 кг/м³ = 0,15 кг/м³. Каков итог?",opts:["ГОДЕН — погрешность в допуске, вариация несущественна","НЕПРИГОДЕН — вариация 0,15 > Δдоп=0,1 кг/м³","ГОДЕН условно — с оговоркой о вариации в свидетельстве","Нужно повторить измерение вариации 3 раза"],a:1,exp:"По п.8.3: V=0,15 кг/м³ > Δдоп=0,1 кг/м³ — прибор непригоден, даже несмотря на то, что погрешность в норме. Оформляется извещение о непригодности."},
 ]},

{id:6,icon:"📊",title:"Бюджет неопределённости измерений",nd:"ГОСТ Р 54500.3-2011; РМГ 43-2001",
 body:`<div class="theory">
<h4>Типы составляющих неопределённости</h4>
<p><strong>Тип A</strong> — составляющие, оцениваемые статистическими методами (по серии повторных измерений):<br>
u_A = S = σ/√n, где σ — СКО, n — число измерений.</p>
<p><strong>Тип B</strong> — составляющие, оцениваемые нестатистическими методами (из свидетельств, справочников, паспортов):<br>
u_B = Δmax / √3 (для равномерного распределения),  u_B = Δmax / 2 (для нормального).</p>
<h4>Квадратурное суммирование</h4>
</div>
<div class="formula">u_c = √(u_A² + u_B1² + u_B2² + … + u_Bk²)</div>
<div class="theory mt12">
<h4>Расширенная неопределённость</h4>
<div class="formula">U = k · u_c</div>
<p>При <em>k=2</em>: P≈95%, при <em>k=3</em>: P≈99%. В поверочной практике стандартный выбор: <strong>k=2, P=95%</strong>.</p>
<h4>Типичный бюджет для поверки ПЧ</h4>
</div>
<table class="ktable">
<tr><th>Составляющая</th><th>Тип</th><th>Источник</th><th>Значение</th></tr>
<tr><td>u_эт — эталонный ПЧ</td><td>B</td><td>Свидетельство эталона</td><td>0,05–0,10 кг/м³</td></tr>
<tr><td>u_A — случайная</td><td>A</td><td>Серия измерений</td><td>σ/√n</td></tr>
<tr><td>u_t — термостатирование</td><td>B</td><td>Поправка на t</td><td>0,02–0,08 кг/м³</td></tr>
<tr><td>u_нест — нестабильность</td><td>B</td><td>Паспорт эталона</td><td>0,03–0,05 кг/м³</td></tr>
<tr><td>u_разр — разрешение</td><td>B</td><td>Последний разряд</td><td>d/(2√3)</td></tr>
</table>
<div class="theory mt12">
<div class="warn-box">⚠ Неполный бюджет (без u_нест или u_t) — методическая ошибка, ведущая к занижению u_c и ложному выводу о соответствии прибора требованиям.</div>
</div>`,
 cases:[

{id:7,icon:"📄",title:"Оформление протокола поверки",nd:"Приказ Минпромторга № 2905; ФЗ № 102-ФЗ",
 body:`<div class="theory">
<h4>Обязательные реквизиты протокола (Приказ № 2905, п. 17)</h4>
<p>Каждый протокол поверки должен содержать:</p>
<p>1. Наименование и № документа на методику поверки<br>
2. Наименование, тип и зав. № поверяемого СИ<br>
3. Наименование и № аттестата аккредитации лаборатории<br>
4. ФИО, подпись поверителя и дата<br>
5. Условия поверки (t, φ, P)<br>
6. Средства поверки (наименование, тип, зав. №, дата поверки эталона)<br>
7. Результаты по каждому разделу методики<br>
8. Заключение (ПРИГОДЕН / НЕПРИГОДЕН)<br>
9. Все страницы — подписаны поверителем</p>
<div class="warn-box">⚠ Отсутствие хотя бы одного обязательного реквизита — основание признать протокол ненадлежащим образом оформленным при проверке (инспекция ФСА).</div>
<h4>Запись во ФГИС «Аршин» (Приказ № 2905, п. 31)</h4>
<p>Поверитель обязан внести сведения о результатах поверки во ФГИС «Аршин» <strong>не позднее 3 рабочих дней</strong> с момента окончания поверки. Без записи в ФГИС свидетельство о поверке не имеет юридической силы.</p>
<h4>Структура свидетельства о поверке</h4>
</div>
<table class="ktable">
<tr><th>Реквизит</th><th>Содержание</th></tr>
<tr><td>Номер свидетельства</td><td>Уникальный № (совпадает с записью в ФГИС)</td></tr>
<tr><td>Дата поверки</td><td>Дата окончания поверки</td></tr>
<tr><td>МПИ / дата следующей поверки</td><td>В соответствии с описанием типа СИ</td></tr>
<tr><td>Заключение</td><td>«Пригоден» (для положительных результатов)</td></tr>
<tr><td>Знак поверки</td><td>Клеймо или наклейка</td></tr>
</table>`,
 cases:[
  {q:"Протокол поверки содержит все разделы, но не указан номер аттестата аккредитации лаборатории. Протокол...",opts:["Действителен — номер аттестата необязателен","Неполный — номер аттестата обязателен для аккредитованных лабораторий","Действителен, если поверитель имеет аттестат","Нужно дополнить номером в течение 10 дней"],a:1,exp:"Приказ №2905, п.17: номер аттестата аккредитации — обязательный реквизит каждого протокола аккредитованной лаборатории (ФЗ №412-ФЗ). Без него протокол ненадлежащим образом оформлен."},
  {q:"Поверка завершена 10 марта (вторник). До какого рабочего дня поверитель обязан внести запись во ФГИС «Аршин»?",opts:["До 11 марта (среда) — 1 рабочий день","До 13 марта (пятница) — 3 рабочих дня","До 17 марта (вторник) — 5 рабочих дней","До 10 апреля — 30 календарных дней"],a:1,exp:"Приказ №2905, п.31: запись во ФГИС — в течение 3 рабочих дней. Завершение 10 марта (вт): 1-й р.д. = 11 марта, 2-й = 12 марта, 3-й = 13 марта. Дедлайн — 13 марта."},
  {q:"Протокол поверки — 2 страницы. Первая страница подписана, вторая (с таблицей результатов) — нет. Каков статус документа?",opts:["Действителен — главная подпись на стр.1 (условия)","Действителен — подпись на стр.1 распространяется на все страницы","Неполный — все страницы должны быть подписаны поверителем","Нужно поставить подпись на стр.2 в течение 3 дней"],a:2,exp:"Приказ №2905, п.24: каждая страница многостраничного протокола должна быть подписана. Стр.2 с результатами — наиболее критичная часть. Без подписи на ней протокол оформлен ненадлежащим образом."},
 ]},

{id:8,icon:"📅",title:"МПИ и свидетельство о поверке",nd:"ФЗ № 102-ФЗ; Приказ Минпромторга № 2905",
 body:`<div class="theory">
<h4>Межповерочный интервал (МПИ)</h4>
<p>МПИ устанавливается при утверждении типа СИ и указывается в описании типа. Поверитель <strong>не вправе</strong> самостоятельно изменять МПИ в свидетельстве.</p>
</div>
<table class="ktable">
<tr><th>Категория ПЧ</th><th>Типичный МПИ</th><th>Основание</th></tr>
<tr><td>Стандартное исполнение</td><td>1 год</td><td>Описание типа СИ</td></tr>
<tr><td>Взрывозащищённое (Ex)</td><td>По решению ГМС</td><td>Согласование с ГМС</td></tr>
<tr><td>ПЧ в агрессивных средах</td><td>6 месяцев – 1 год</td><td>Описание типа СИ</td></tr>
<tr><td>Эталонный ПЧ 1-го разряда</td><td>2 года</td><td>Аттестация эталона</td></tr>
</table>
<div class="theory mt12">
<h4>Когда свидетельство прекращает действие</h4>
<p>Свидетельство о поверке прекращает действие при наступлении <strong>любого</strong> из условий:</p>
<p>— Истечение МПИ<br>
— Нарушение знаков поверки (сорванная пломба, повреждённое клеймо)<br>
— Механическое повреждение СИ, влияющее на метрологические характеристики</p>
<div class="info-box">💡 Хранение прибора без использования не продлевает МПИ. Если срок поверки истёк — применение прибора в сферах ГРОЕИ запрещено.</div>
<h4>Расчёт даты следующей поверки</h4>
<p>Дата следующей поверки = дата поверки + МПИ. Если МПИ = 1 год, и поверка проведена 15.03.2024, то следующая поверка — <strong>не позднее 15.03.2025</strong>.</p>
</div>`,
 cases:[
  {q:"ПЧ с МПИ=1 год поверен 20.06.2024. Когда истекает срок поверки?",opts:["20.06.2025","20.07.2025","20.06.2026","После следующей плановой поверки предприятия"],a:0,exp:"Дата следующей поверки: 20.06.2024 + 1 год = 20.06.2025. После этой даты применение прибора в ГРОЕИ без поверки незаконно."},
  {q:"В свидетельстве о поверке Ex-ПЧ указан МПИ=2 года. В описании типа СИ для данного Ex-исполнения — МПИ=1 год (согласовано ГМС). Какой МПИ является действительным?",opts:["2 года — как указано в выданном свидетельстве","1 год — из описания типа СИ, согласованного ГМС","Среднее: 1,5 года","На усмотрение эксплуатирующей организации"],a:1,exp:"МПИ устанавливается описанием типа СИ (утверждённым ГМС) и является обязательным. Свидетельство с завышенным МПИ юридически некорректно — прибор должен быть поверен через 1 год."},
 ]},

{id:9,icon:"🔗",title:"Метрологическая прослеживаемость",nd:"ФЗ № 102-ФЗ, ст. 17; ГОСТ Р ИСО 17511",
 body:`<div class="theory">
<h4>Что такое метрологическая прослеживаемость</h4>
<p>Метрологическая прослеживаемость — <strong>документально подтверждённая непрерывная цепь</strong> сличений, связывающая результат измерений с национальным (или международным) эталоном через указанные неопределённости.</p>
<h4>Цепочка прослеживаемости для поверки ПЧ</h4>
</div>
<table class="ktable">
<tr><th>Звено цепочки</th><th>Документ</th><th>Держатель</th></tr>
<tr><td>Государственный первичный эталон ГЭТ 145</td><td>Реестр государственных эталонов</td><td>ВНИИМ им. Менделеева</td></tr>
<tr><td>Эталон 1-го разряда</td><td>Свидетельство об аттестации эталона</td><td>ЦСМ, НИИ</td></tr>
<tr><td>Рабочий эталон ПЧ</td><td>Свидетельство о поверке эталона</td><td>Поверочная лаборатория</td></tr>
<tr><td>Поверяемый ПЧ</td><td>Свидетельство о поверке</td><td>Пользователь СИ</td></tr>
</table>
<div class="theory mt12">
<h4>Требования к документации прослеживаемости</h4>
<p>Для каждого рабочего эталона, используемого при поверке, поверитель обязан иметь:</p>
<p>— Действующее свидетельство о поверке (или аттестации) эталона<br>
— Зав. № эталона, совпадающий с указанным в протоколе<br>
— Сведения о прослеживаемости эталона до государственного первичного</p>
<div class="warn-box">⚠ «Разрыв цепи»: если хотя бы одно звено не подтверждено документально — прослеживаемость нарушена. Результаты поверки не могут считаться метрологически прослеживаемыми.</div>
<h4>Аккредитация и прослеживаемость</h4>
<p>Аккредитованная лаборатория (ФСА) обязана поддерживать прослеживаемость всех рабочих эталонов. Это проверяется при инспекционном контроле.</p>
</div>`,
 cases:[
  {q:"Рабочий эталон ПЧ поверен 10 месяцев назад (МПИ эталона=1 год). В протоколе поверки клиентского ПЧ использован именно этот эталон. Прослеживаемость...",opts:["Нарушена — эталон должен поверяться каждые 6 месяцев","Не нарушена — МПИ ещё не истёк","Нарушена — для поверки клиентских ПЧ нужен эталон 1-го разряда, а не рабочий","Условно нарушена — нужно пересчитать неопределённость"],a:1,exp:"МПИ эталона=1 год, прошло 10 месяцев — свидетельство действующее. Прослеживаемость не нарушена при условии, что зав. № в протоколе совпадает с зав. № в свидетельстве эталона."},
  {q:"В протоколе поверки указан эталонный ПЧ зав. №12543. Свидетельство на эталон — зав. №12453. Что это означает для прослеживаемости?",opts:["Ничего — незначительная опечатка","Прослеживаемость нарушена: документально подтверждён другой экземпляр","Нужно запросить пояснение у изготовителя эталона","Допустимо при наличии акта о замене"],a:1,exp:"Несовпадение заводских номеров (12543 ≠ 12453) означает, что использованный эталон документально не подтверждён — прослеживаемость разорвана. Результаты поверки недействительны."},
 ]},
];

const DOCTEXTS={
  'mi2816':{
    code:'МИ 2816-2012',
    title:'Преобразователи плотности поточные. Методика поверки на месте эксплуатации',
    org:'ГНМЦ ФГУП ВНИИМ им. Д.И. Менделеева',
    date:'06.12.2012',
    url:'https://files.stroyinf.ru/Data2/1/4293771/4293771518.htm',
    sections:[
      {n:'Введение',t:'Общие сведения',body:`Настоящая рекомендация устанавливает методику первичной и периодической поверки поточных преобразователей плотности (ПП) на месте эксплуатации.<br><br>Разработана ООО «ИМС Индастриз» совместно с ГМНЦ ФГУП ВНИИМ им. Д.И. Менделеева. Вводится взамен МИ 2816-2011.<br><br><b>МПИ (межповерочный интервал):</b> определяется при утверждении типа, как правило — 1 год.`},
      {n:'Раздел 1',t:'Область применения',body:`Настоящая рекомендация распространяется на поточные вибрационные преобразователи плотности жидкостей, входящие в состав узлов учёта товарной нефти и нефтепродуктов.<br><br><b>Диапазон измерений плотности:</b> от 610 до 1100 кг/м³.<br><br>Рекомендация устанавливает методику <b>первичной и периодической поверок</b> ПП непосредственно <b>на месте эксплуатации</b> — без демонтажа из технологического трубопровода.`},
      {n:'Раздел 2',t:'Нормативные ссылки',body:`При разработке настоящей рекомендации использованы следующие нормативные документы:<br><br>— ГОСТ 8.024-2002 ГСИ. Государственная поверочная схема для средств измерений плотности;<br>— ГОСТ 18300-87 Спирт этиловый ректификованный технический;<br>— ГОСТ 443-76 Нефрас С2-80/120;<br>— МИ 2153-2004 Плотность нефти. Требования к МВИ ареометром;<br>— МИ 2632-2001 Плотность нефти и нефтепродуктов и коэффициенты CTL, CPL.`},
      {n:'Раздел 3',t:'Термины, определения и сокращения',body:`<b>ПП</b> — поточный преобразователь плотности жидкостей.<br><b>РЭ</b> — рабочий эталон.<br><b>CTL</b> (Coefficient of Thermal expansion of Liquid) — коэффициент, учитывающий изменение плотности жидкости вследствие отличия её температуры от стандартной (15 °С или 20 °С).<br><b>CPL</b> (Coefficient of Pressure correction for Liquid) — коэффициент, учитывающий увеличение плотности жидкости под воздействием рабочего давления в трубопроводе.<br><b>СИКН</b> — система измерений количества и показателей качества нефти.`},
      {n:'Раздел 4',t:'Операции поверки',body:`При проведении поверки выполняют следующие операции в указанном порядке:<br><br>4.1 Внешний осмотр (раздел 9);<br>4.2 Опробование (раздел 9);<br>4.3 Определение абсолютной погрешности (раздел 9).<br><br>Если при выполнении одной из операций получен отрицательный результат, дальнейшая поверка прекращается.`},
      {n:'Раздел 5',t:'Средства поверки',body:`При проведении поверки применяются:<br><br><b>5.1 Эталонный поточный ПП</b> — рабочий эталон единиц плотности 1-го разряда по ГОСТ 8.024. Предел допускаемой погрешности эталонного ПП должен быть <b>в 2–3 раза меньше</b> предела допускаемой погрешности поверяемого ПП.<br><br><b>5.2 Эталонный термометр</b> — для контроля температуры жидкости в трубопроводе; диапазон от -20 до +100 °С, погрешность не более ±0,1 °С.<br><br><b>5.3 Манометр</b> — для контроля давления; класс точности не ниже 0,6.<br><br>5.4 Допускается применение средств поверки, не указанных в настоящей рекомендации, при условии соответствия их характеристик приведённым требованиям.<br><br>Все средства поверки должны иметь действующие свидетельства о поверке.`},
      {n:'Раздел 6',t:'Требования безопасности и квалификации',body:`<b>6.1 Требования к поверителям:</b> к выполнению поверки допускаются лица, изучившие настоящую рекомендацию и эксплуатационную документацию на ПП и средства поверки, прошедшие инструктаж по технике безопасности и имеющие удостоверение поверителя.<br><br><b>6.2 Требования безопасности:</b> при проведении поверки выполняют требования правил техники безопасности, действующих на данном производственном объекте, правил работы с нефтью и нефтепродуктами, правил работы с электроустановками.`},
      {n:'Раздел 7',t:'Условия поверки',body:`При проведении поверки соблюдают следующие условия:<br><br>— Рабочая жидкость: нефть или нефтепродукт в рабочих условиях эксплуатации;<br>— Диапазон плотности жидкости: в пределах рабочего диапазона поверяемого ПП;<br>— <b>Изменение температуры жидкости в процессе одного сеанса измерений: не более ±0,2 °С;</b><br>— Изменение давления в трубопроводе в процессе измерений: не более допустимого для данного ПП;<br>— Изменение расхода жидкости в процессе измерений: не более допустимого для данного ПП.`},
      {n:'Раздел 8',t:'Подготовка к поверке',body:`<b>8.1</b> Перед поверкой проверяют документацию на поверяемый ПП и эталонный ПП: паспорт, эксплуатационную документацию, свидетельство о поверке РЭ.<br><br><b>8.2</b> Эталонный ПП устанавливают <b>последовательно</b> с поверяемым ПП в общий технологический трубопровод таким образом, чтобы через оба ПП одновременно протекала одна и та же жидкость с минимально возможной разностью параметров (температуры, давления).<br><br><b>8.3</b> Термометр устанавливают в непосредственной близости от ПП для контроля температуры жидкости в трубопроводе.`},
      {n:'Раздел 9',t:'Проведение поверки и обработка результатов',body:`<b>9.1 Внешний осмотр:</b> проверяют соответствие ПП требованиям эксплуатационной документации: отсутствие механических повреждений, читаемость маркировки, целостность пломб и знаков поверки.<br><br><b>9.2 Опробование:</b> проверяют функционирование ПП в рабочих условиях: наличие и стабильность выходного сигнала, отсутствие кодов ошибок.<br><br><b>9.3 Определение погрешности:</b><br>— В рабочем диапазоне расхода задают не менее 3–5 точек;<br>— В каждой точке выполняют <b>не менее 5 синхронных пар одновременных измерений</b> поверяемым и эталонным ПП;<br>— Показания обоих ПП приводятся к единым условиям с применением коэффициентов CTL и CPL (Приложение А);<br>— Абсолютную погрешность вычисляют как разность показаний поверяемого и эталонного ПП, приведённых к единым условиям;<br>— Результаты записывают в протокол по форме Приложения В.`},
      {n:'Раздел 10',t:'Оформление результатов поверки',body:`<b>10.1</b> При положительных результатах поверки (погрешность не превышает допускаемое значение во всех точках) выдаётся <b>свидетельство о поверке</b> установленной формы и наносится знак поверки.<br><br><b>10.2</b> При отрицательных результатах поверки выдаётся <b>извещение о непригодности</b>. Ранее выданное свидетельство аннулируется. Знаки поверки гасятся. ПП направляется в ремонт или списывается.<br><br><b>10.3</b> Протокол поверки оформляется по установленной форме <b>Приложения В</b>. Произвольная форма протокола недопустима.<br><br><b>10.4</b> Результаты поверки вносятся во ФГИС «Аршин» в установленные сроки.`},
      {n:'Приложение А',t:'Определение CTL, CPL и приведённой плотности',body:`<b>CTL</b> (Coefficient of Thermal expansion of Liquid) — коэффициент термического расширения жидкости. Учитывает изменение плотности жидкости вследствие отличия её температуры от стандартной. Рассчитывается по таблицам или формулам в зависимости от типа нефтепродукта и его плотности при стандартных условиях.<br><br><b>CPL</b> (Coefficient of Pressure correction for Liquid) — коэффициент сжимаемости жидкости. Учитывает увеличение плотности жидкости под рабочим давлением в трубопроводе. Рассчитывается по значению давления и плотности при стандартных условиях.<br><br><b>Приведённая плотность:</b><br>ρ₁₅ = ρизм × CTL × CPL<br><br>где ρизм — плотность, измеренная ПП при рабочих условиях (t, P);<br>CTL и CPL — вычислены по стандартным алгоритмам ГОСТ Р 8.615 / МИ 2632.`},
      {n:'Приложение В',t:'Форма протокола поверки',body:`Протокол поверки должен содержать:<br>— наименование и обозначение НД на методику поверки;<br>— наименование, тип и серийный номер поверяемого ПП;<br>— наименование, тип, серийный номер и данные о поверке эталонного ПП;<br>— дату и место проведения поверки;<br>— условия поверки (температура, давление, расход, тип жидкости);<br>— результаты измерений в каждой точке;<br>— вычисленные значения погрешностей;<br>— заключение о пригодности;<br>— подпись поверителя на каждой странице;<br>— дату следующей поверки (МПИ).`},
    ],
  },
  'mi2403':{
    code:'МИ 2403-97',
    title:'Преобразователи плотности поточные вибрационные «Солартрон» типов 7830, 7835 и 7840. Методика поверки на месте эксплуатации',
    org:'ГНМЦ-ВНИИР Госстандарта России, Казань',
    date:'1997',
    url:'https://meganorm.ru/Data2/1/4293762/4293762048.htm',
    sections:[
      {n:'Введение',t:'Область применения',body:`Настоящая рекомендация распространяется на поточные вибрационные преобразователи плотности жидкости типов <b>7830, 7835 и 7840</b> (изготовитель — фирма Solartron Transducers Ltd., Англия), входящие в состав <b>узлов учёта товарной нефти</b>.<br><br>Устанавливает методику первичной и периодической поверки на месте эксплуатации с использованием в качестве средств поверки автоматических плотномеров.<br><br>Допускается по настоящей методике проводить поверку преобразователей плотности в комплекте со специализированными контроллерами.<br><br><b>Межповерочный интервал — 1 год.</b>`},
      {n:'Раздел 1',t:'Операции поверки',body:`При проведении поверки выполняют следующие операции:<br><br>— внешний осмотр (п. 7.1);<br>— опробование (п. 7.2);<br>— определение абсолютной погрешности (п. 7.3).`},
      {n:'Раздел 2',t:'Средства поверки',body:`<b>2.1 Автоматический плотномер — рабочий эталон (РЭ)</b> плотности 1-го разряда по ГОСТ 8.024:<br>— диапазон измерений: от 790 до 910 кг/м³;<br>— пределы абсолютной погрешности: <b>±0,1 кг/м³</b>;<br>— оснащён цифровым термометром: диапазон 0–50 °С, погрешность ±0,1 °С;<br>— примеры: типа МДП, МДЛ-1.<br><br><b>2.1.2</b> Вычислительное устройство (ПЭВМ или специализированный контроллер) либо <b>частотомер типа Ч3-38</b> по ГОСТ 7590, диапазон 100–2000 Гц.<br><br><b>2.1.3</b> Термометры жидкостные стеклянные типа А, цена деления 0,1 °С, диапазон 0–50 °С, по ГОСТ 28498.<br><br><b>2.1.4</b> Манометр класса точности 0,6, диапазон 0–6 МПа.<br><br><b>2.1.5 Промывочные жидкости:</b> нефрас-С 50/170 по ГОСТ 8505, толуол.<br><br>Все применяемые СИ должны иметь действующие свидетельства или клейма о поверке.`},
      {n:'Раздел 3',t:'Требования к квалификации поверителей',body:`К выполнению измерений при поверке допускаются лица, изучившие инструкции по эксплуатации поверяемого ПП и средств поверки, настоящую рекомендацию и <b>имеющие удостоверение поверителя</b>.`},
      {n:'Раздел 4',t:'Требования безопасности',body:`При проведении поверки выполняют требования:<br>— правил техники безопасности при эксплуатации электроустановок потребителей;<br>— правил устройства и безопасности сосудов, работающих под давлением;<br>— правил безопасности, изложенных в эксплуатационной документации на применяемые СИ;<br>— правил безопасности, регламентирующих работу на данном технологическом объекте (на узле учёта нефти и в операторной).`},
      {n:'Раздел 5',t:'Условия поверки',body:`При проведении поверки соблюдают следующие условия:<br><br><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:var(--bg)"><th style="padding:8px;text-align:left;border-bottom:1px solid var(--br)">Параметр</th><th style="padding:8px;text-align:right;border-bottom:1px solid var(--br)">Значение</th></tr></thead><tbody><tr><td style="padding:8px;border-bottom:1px solid var(--br)">Температура воздуха в блоке качества, °С</td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)">от 5 до 40</td></tr><tr><td style="padding:8px;border-bottom:1px solid var(--br)">Температура нефти в трубопроводе, °С</td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)">от 0 до 50</td></tr><tr><td style="padding:8px;border-bottom:1px solid var(--br)">Давление нефти в трубопроводе, МПа</td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)">до 4</td></tr><tr><td style="padding:8px;border-bottom:1px solid var(--br)">Напряжение питания, В</td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)">220, −15%/+10%, 50 Гц</td></tr><tr><td style="padding:8px;border-bottom:1px solid var(--br)">Относительная влажность, не более, %</td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)">80</td></tr><tr><td style="padding:8px;border-bottom:1px solid var(--br)"><b>Изменение плотности нефти при поверке, кг/м³</b></td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)"><b>не более 0,1 за 5 мин</b></td></tr><tr><td style="padding:8px;border-bottom:1px solid var(--br)"><b>Изменение температуры нефти, °С</b></td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)"><b>не более 0,1 за 5 мин</b></td></tr><tr><td style="padding:8px;border-bottom:1px solid var(--br)"><b>Изменение давления нефти, МПа</b></td><td style="padding:8px;text-align:right;border-bottom:1px solid var(--br)"><b>не более 0,05 за 5 мин</b></td></tr></tbody></table>`},
      {n:'Раздел 6',t:'Подготовка к поверке',body:`<b>6.1</b> Проверяют работоспособность и характеристики РЭ в соответствии с инструкцией по эксплуатации и с учётом особенностей применяемых средств поверки (Приложение 1).<br><br><b>Особенности подготовки РЭ типа МДП:</b><br>— Проверяют горизонтальность положения МДП, при необходимости регулируют;<br>— Промывают измерительную камеру и поплавок растворителем и толуолом;<br>— Включают контроллер и запускают рабочую программу автоматической поверки;<br>— Открывают вентили и организуют поток нефти до стабилизации температуры в камере МДП.<br><br><b>Особенности подготовки РЭ типа МДЛ:</b><br>— Промывают измерительную камеру и поплавок бензином и толуолом;<br>— Гибкими рукавами присоединяют датчик МДЛ к технологической линии последовательно с поверяемым плотномером.`},
      {n:'Раздел 7',t:'Проведение поверки',body:`<b>7.1 Внешний осмотр</b><br>7.1.1 Устанавливают соответствие ПП по комплектности и внешнему виду требованиям эксплуатационной документации, правильность монтажа и отсутствие механических повреждений.<br>7.1.2 Проверяют наличие сертификата градуировки поверяемого плотномера и соответствие введённых в память контроллера коэффициентов значениям, приведённым в сертификате или в свидетельстве о поверке.<br><br><b>7.2 Опробование</b><br>При опробовании проверяют исправность электрической схемы и общее функционирование согласно инструкции по эксплуатации.<br><br><b>7.3 Определение абсолютной погрешности</b><br>7.3.1 Определение производится при одновременном измерении плотности нефти поверяемым и эталонным средствами при рабочих значениях температуры и давления.<br><br>7.3.2 Устанавливается расход нефти в блоке качества <b>в пределах от 0,5 до 1 м³/ч</b>. При достижении условий п.5 производят измерения плотности поверяемым и эталонным ПП, а также температуры и давления нефти.<br><br>7.3.3 При отсутствии вычислительного устройства выходной сигнал ПП измеряют частотомером и по формулам, приведённым в сертификате, вычисляют плотность.<br><br>7.3.4 Результаты записывают в протокол по форме Приложения 2.<br><br><b>7.3.5 Определение погрешности выполняют три раза.</b>`},
      {n:'Раздел 8',t:'Обработка результатов измерений',body:`<b>8.1 Абсолютную погрешность</b> плотномера определяют по формуле:<br><br><div style="background:var(--bg);border-radius:10px;padding:14px 18px;font-family:monospace;margin:10px 0;border:1px solid var(--br)"><b>Δ = ρ − D₀</b></div><br>где <b>ρ</b> — результат измерений плотности ПП, кг/м³;<br><b>D₀</b> — результат измерений плотности рабочим эталоном, приведённый по температуре и давлению к условиям измерения поверяемого плотномера по формуле:<br><br><div style="background:var(--bg);border-radius:10px;padding:14px 18px;font-family:monospace;margin:10px 0;border:1px solid var(--br)"><b>D₀ = ρ₀ · [1 + (β + C)(t₀ − t) + γ(P − P₀)]</b></div><br>где:<br><b>β</b> — коэффициент объёмного расширения нефти при t₀ (табл. 1 прил. 2 МИ 2153);<br><b>C</b> = +23·10⁻⁶ при t₀ выше 20 °С; C = −23·10⁻⁶ при t₀ ниже 20 °С; C = 0 при t₀ = 20 °С;<br><b>γ</b> — коэффициент сжимаемости нефти (табл. 2 прил. 2 МИ 2153);<br><b>t₀, t</b> — температура нефти в РЭ и в поверяемом плотномере, °С;<br><b>P₀, P</b> — давление нефти в РЭ и в поверяемом плотномере, МПа.<br><br><b>8.2</b> Вычисления по формулам могут производиться в вычислительном устройстве РЭ.<br><br><b>8.3 Критерий годности:</b><br>— Для типов 7830 и 7835: <b>|Δ| ≤ ±0,3 кг/м³</b>;<br>— Для типа 7840: <b>|Δ| ≤ ±Δд</b>, где Δд вычисляется по Приложению 3.<br><br>Если абсолютная погрешность превышает указанные пределы — ПП <b>градуируют</b> по методике Приложения 4.`},
      {n:'Раздел 9',t:'Оформление результатов поверки',body:`<b>9.1</b> При положительных результатах поверки плотномер признают годным к применению и выдают <b>свидетельство о поверке</b> установленной формы по ПР 50.2.006.<br><br><b>9.2</b> При отрицательных результатах поверки плотномер к применению не допускают, свидетельство аннулируют и выдают <b>извещение о непригодности</b> с указанием причин по ПР 50.2.006.`},
      {n:'Приложение 2',t:'Протокол поверки',body:`Протокол поверки содержит следующие поля:<br><br>— Средство измерений (наименование, тип, зав.№, год выпуска, владелец);<br>— Результаты измерений (таблица из 3 строк):<br><br><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--bg)"><th style="padding:6px;border:1px solid var(--br)">#</th><th style="padding:6px;border:1px solid var(--br)">T, мкс</th><th style="padding:6px;border:1px solid var(--br)">ρ, кг/м³</th><th style="padding:6px;border:1px solid var(--br)">t, °С</th><th style="padding:6px;border:1px solid var(--br)">P, МПа</th><th style="padding:6px;border:1px solid var(--br)">ρ₀, кг/м³</th><th style="padding:6px;border:1px solid var(--br)">t₀, °С</th><th style="padding:6px;border:1px solid var(--br)">P₀, МПа</th><th style="padding:6px;border:1px solid var(--br)">D₀, кг/м³</th><th style="padding:6px;border:1px solid var(--br)">Δ, кг/м³</th></tr></thead><tbody><tr><td style="padding:6px;border:1px solid var(--br);text-align:center">1</td><td colspan="9" style="padding:6px;border:1px solid var(--br)"></td></tr><tr><td style="padding:6px;border:1px solid var(--br);text-align:center">2</td><td colspan="9" style="padding:6px;border:1px solid var(--br)"></td></tr><tr><td style="padding:6px;border:1px solid var(--br);text-align:center">3</td><td colspan="9" style="padding:6px;border:1px solid var(--br)"></td></tr></tbody></table><br>Вывод: ___________________<br><br>Подпись поверителя, дата.`},
      {n:'Приложение 4',t:'Методика градуировки при превышении погрешности',body:`При превышении допустимой погрешности ПП подлежит <b>градуировке</b> (без снятия с линии):<br><br><b>1.</b> Вычислить среднюю погрешность по трём результатам:<br><div style="background:var(--bg);border-radius:10px;padding:12px 16px;font-family:monospace;margin:10px 0;border:1px solid var(--br)">Δср = (Δ₁ + Δ₂ + Δ₃) / 3</div><br><b>2.</b> Вычислить новое значение коэффициента K₀:<br><div style="background:var(--bg);border-radius:10px;padding:12px 16px;font-family:monospace;margin:10px 0;border:1px solid var(--br)">K₀нов = K₀ − Δср</div><br><b>3.</b> Ввести новый K₀нов в память контроллера.<br><br><b>4.</b> Определить абсолютную погрешность с новым K₀ <b>два раза</b> в соответствии с разделом 7. Если погрешность не превышает допустимое значение — ПП признают годным.`},
    ],
  },
};

function renderNDOverlay(){
  const el=document.getElementById('nd-overlay-root');if(!el)return;
  if(!S.ndDoc){el.innerHTML='';return;}
  const doc=DOCTEXTS[S.ndDoc];if(!doc){el.innerHTML='';return;}
  const isRed=S.ndDoc==='mi2403';
  const col=isRed?'var(--red)':'var(--blue)';
  const secId='nd-open-'+S.ndDoc;

  const secHtml=doc.sections.map((s,i)=>{
    const openKey=secId+'-'+i;
    const isOpen=S.ndSecOpen===openKey;
    return '<div style="border:1px solid var(--br);border-radius:12px;overflow:hidden;margin-bottom:6px">'+
      '<div style="padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:'+(isOpen?'rgba(0,63,138,.04)':'var(--w)')+'"'+
      ' onclick="set({ndSecOpen:'+(isOpen?'null':'\''+openKey+'\'')+'})">'+
      '<div class="flex g8"><span style="font-size:11px;font-weight:700;color:var(--t3);font-family:monospace;min-width:80px">'+s.n+'</span>'+
      '<span style="font-size:15px;font-weight:600">'+s.t+'</span></div>'+
      '<span style="color:var(--t3)">'+(isOpen?'▲':'▼')+'</span></div>'+
      (isOpen?'<div style="padding:16px 20px;border-top:1px solid var(--br);font-size:14px;line-height:1.75;color:var(--t1)">'+s.body+'</div>':'')+
      '</div>';
  }).join('');

  el.innerHTML=
    '<div class="nd-overlay" onclick="if(event.target===this)set({ndDoc:null,ndSecOpen:null})">'+
    '<div class="nd-panel">'+
    '<div class="nd-panel-hdr">'+
    '<div style="flex:1">'+
    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:4px">Полный текст методики</div>'+
    '<div style="font-size:17px;font-weight:900;color:'+col+'">'+doc.code+'</div>'+
    '<div style="font-size:12px;color:var(--t2);margin-top:3px;line-height:1.4">'+doc.title+'</div>'+
    '<div style="font-size:11px;color:var(--t3);margin-top:4px">'+doc.org+' · '+doc.date+'</div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-shrink:0;align-items:flex-start">'+
    '<a href="'+doc.url+'" target="_blank" class="btn btn-gsm" style="font-size:12px">Источник ↗</a>'+
    '<button class="btn btn-gsm" onclick="set({ndDoc:null,ndSecOpen:null})">✕</button>'+
    '</div>'+
    '</div>'+
    '<div class="nd-panel-body">'+
    '<div class="info-box mb16" style="font-size:13px">Нажмите на раздел для просмотра полного текста</div>'+
    secHtml+

// Helpers для POSITIONS
function makeEnrollments(posId){
  const pos=POSITIONS.find(p=>p.id===posId);
  if(!pos)return[];
  const now=new Date();
  return pos.items.map(item=>{
    const dl=new Date(now);dl.setDate(dl.getDate()+item.days);
    return{id:item.id,name:item.name,type:item.type,li:item.li,
           deadline:dl.toISOString(),enrolledAt:now.toISOString(),done:false,doneAt:null};
  });
}
function enrollStatus(e){
  if(e.done)return'done';
  const left=Math.ceil((new Date(e.deadline)-new Date())/86400000);
  if(left<0)return'overdue';
  if(left<=3)return'urgent';
  return'pending';
}
function fmtDl(iso){return new Date(iso).toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});}

// eaPlan — сравнение теста и самооценки
function eaPlan(){
  return EA.map(s=>{
    const ok=S.eaTA[s.id]===s.q.k;
    const sf=S.eaSA[s.id];
    let cls,pri,icon,label;
    if(!ok&&sf==='know')  {cls='pr-critical';pri=0;icon='🚨';label='Критический пробел — переоценка знаний';}
    else if(!ok&&sf==='doubt'){cls='pr-study';   pri=1;icon='📚';label='Требует изучения';}
    else if(!ok&&sf==='dont') {cls='pr-study';   pri=1;icon='📚';label='Требует изучения';}
    else if(ok&&sf==='dont')  {cls='pr-check';   pri=2;icon='⚡';label='Проверьте: возможно случайный ответ';}
    else if(ok&&sf==='doubt') {cls='pr-reinforce';pri=3;icon='📈';label='Закрепить уверенность';}
    else                      {cls='pr-strong';  pri=4;icon='✅';label='Уверенное знание';}
    return{...s,ok,sf,cls,pri,icon,label};
  }).sort((a,b)=>a.pri-b.pri);
}

function eaTNext(){
  const next=S.eaIdx+1;

  else{const c=EA.filter(s=>S.eaTA[s.id]===s.q.k).length;const sc=Math.round(c/EA.length*100);
    set({eaPhase:'self',eaIdx:0,eScore:sc,ePassed:sc>=60});
    toast('Тест завершён: '+sc+'%','info');}

function sEnrollments(){
  const en=S.enrollments||[];
  const pos=POSITIONS.find(p=>p.id===S.user?.positionId);
  const done=en.filter(e=>e.done).length;
  const ovd=en.filter(e=>enrollStatus(e)==='overdue').length;
  const stCfg={
    done:{c:'var(--green)',border:'rgba(40,205,65,.2)',label:'Выполнено'},
    overdue:{c:'var(--red)',border:'rgba(204,31,31,.25)',label:'Просрочено'},
    urgent:{c:'var(--orange)',border:'rgba(255,149,0,.3)',label:'Срочно'},
    pending:{c:'var(--t3)',border:'var(--br)',label:'В срок'},
  };
  const rows=en.map((e,i)=>{
    const st=enrollStatus(e);const cfg=stCfg[st];
    const left=Math.ceil((new Date(e.deadline)-new Date())/86400000);
    const lbl=st==='done'?`✓ Выполнено ${e.doneAt?fmtDl(e.doneAt):''}`:
               st==='overdue'?`⚠ Просрочено — дедлайн ${fmtDl(e.deadline)} (${Math.abs(left)} дн. назад)`:
               st==='urgent'?`⏰ Срочно — до ${fmtDl(e.deadline)} (${left} дн.)`:
               `Срок до ${fmtDl(e.deadline)} (${left} дн.)`;
    return`<div style="padding:14px 16px;border:1px solid ${cfg.border};border-radius:12px;display:flex;align-items:center;gap:12px;${e.done?'opacity:.65':''}">
      <div style="font-size:18px;flex-shrink:0">${{lesson:'📖',test:'📝',trainer:'🔍',lessons_all:'📚'}[e.type]||'📌'}</div>
      <div style="flex:1"><div class="f15 fw5 ${e.done?'c-t2':''}" style="${e.done?'text-decoration:line-through':''}">${e.name}</div>
      <div class="f12 mt4" style="color:${cfg.c}">${lbl}</div></div>
      ${!e.done?`<button class="btn btn-gsm f11" onclick="markEnroll(${i})">✓</button>`:''}
    </div>`;
  }).join('');
  return`<div>${navBar('dash',true)}
<div class="page"><div class="wrap" style="padding-top:28px;padding-bottom:80px">
  <div class="between mb20">
    <div><div class="eyebrow mb6">Мой план обучения</div>
    <div class="h2">${pos?.name||'Должность'}</div>
    <div class="f13 c-t2 mt4">${pos?pos.dept+' · Код '+pos.code:''}</div></div>
    <div class="ta-c"><div class="score-xl c-blue" style="font-size:48px">${done}<span style="font-size:20px;color:var(--t3)">/${en.length}</span></div><div class="caption mt4">выполнено</div></div>
  </div>
  ${en.length?`<div class="pbar mb20" style="height:6px"><div class="pfill" style="width:${Math.round(done/en.length*100)}%"></div></div>`:''}
  ${en.length===0?`<div class="card ta-c" style="padding:40px"><div style="font-size:36px;margin-bottom:12px">📋</div><div class="h3 mb8">План не назначен</div><div class="f15 c-t2 mb20">Зарегистрируйтесь с указанием должности.</div><button class="btn btn-p" onclick="set({scr:'login',loginMode:'reg'})">Зарегистрироваться →</button></div>`
  :`<div class="col g8">${rows}</div>`}
</div></div></div>`;
}

function sTest(isE){
  const QS=isE?EQ:CQ,qi=isE?S.eQ:S.cQ,pick=isE?S.ePick:S.cPick,fb=isE?S.eFB:S.cFB,ans=isE?S.eAns:S.cAns,q=QS[qi],total=QS.length;
  const pct=Math.round((qi+1)/total*100);
  return`<div>${navBar('dash',false)}
<div class="page"><div class="slim" style="padding-top:32px;padding-bottom:80px">
  <div class="between mb20">
    <span class="eyebrow">${isE?'Входной тест':'Контрольный тест'}</span>
    <span class="f15 mono fw6 c-blue">${qi+1} / ${total}</span>
  </div>
  <div class="pbar mb24"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="card mb16" style="padding:28px;border:1px solid rgba(0,113,227,.14)">
    <div class="eyebrow mb12">Вопрос ${qi+1}</div>
    <div style="font-size:19px;font-weight:500;line-height:1.45">${q.t}</div>
  </div>
  <div class="col mb20" style="gap:8px">
    ${['a','b','c','d'].map(k=>{
      let cls='opt';
      if(fb){if(k===q.k)cls+=' ok';else if(k===ans[q.id]&&k!==q.k)cls+=' no';}
      else if(k===pick)cls+=' sel';
      const m=fb&&k===q.k?'<span style="margin-left:auto;color:var(--green)">✓</span>':(fb&&k===ans[q.id]&&k!==q.k?'<span style="margin-left:auto;color:var(--red)">✗</span>':'');
      return`<button class="${cls}" onclick="${fb?'':'pickOpt(\''+k+'\','+(isE?1:0)+')'}" ${fb?'style="cursor:default"':''}>
        <span class="okey">${k.toUpperCase()}</span><span style="flex:1">${q[k]}</span>${m}
      </button>`;
    }).join('')}
  </div>
  ${fb&&q.x?`<div class="explain mb20"><b>Пояснение: </b>${q.x}</div>`:''}
  <div style="display:flex;justify-content:flex-end">
    ${!fb
      ?`<button class="btn btn-p" ${!pick?'disabled':''} onclick="confirmOpt(${isE?1:0})">Проверить ответ</button>`
      :`<button class="btn btn-p" onclick="nextQ(${isE?1:0})">${qi<total-1?'Следующий вопрос →':'Завершить тест →'}</button>`}
  </div>
</div></div></div>`;
}
